<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ferols Tours & Safaris — Quotation System</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#0d4a1a;color:#fff;min-height:100vh}
input,select,textarea{font-family:Georgia,serif;outline:none}
input[type=number]::-webkit-inner-spin-button{opacity:1}
.field-label{display:block;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-weight:bold}
.inp{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:6px;color:#fff;padding:9px 12px;font-size:14px;font-family:Georgia,serif}
.inp:focus{border-color:#f5c500}
.sel{width:100%;background:#0d4a1a;border:1px solid rgba(255,255,255,0.18);border-radius:6px;color:#fff;padding:9px 12px;font-size:14px;font-family:Georgia,serif}
.sel:focus{border-color:#f5c500}
.textarea{width:100%;min-height:80px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:6px;color:#fff;padding:9px 12px;font-size:14px;font-family:Georgia,serif;resize:vertical}
.btn-gold{background:linear-gradient(135deg,#1a6b2a,#2d8a3e);color:#fff;border:2px solid #f5c500;border-radius:8px;padding:9px 20px;font-weight:bold;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.btn-gold:hover{background:linear-gradient(135deg,#2d8a3e,#3da050)}
.btn-outline{background:rgba(245,197,0,0.12);color:#f5c500;border:1px solid #f5c500;border-radius:8px;padding:9px 18px;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.btn-outline:hover{background:rgba(245,197,0,0.22)}
.btn-danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.4);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:Georgia,serif}
.btn-sm{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:Georgia,serif}
.btn-settings{background:rgba(245,197,0,0.1);color:#f5c500;border:1px solid rgba(245,197,0,0.3);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-family:Georgia,serif;display:flex;align-items:center;gap:6px}
.btn-settings:hover{background:rgba(245,197,0,0.2)}
.tab-btn{padding:9px 15px;border-radius:8px;cursor:pointer;font-size:13px;font-family:Georgia,serif;transition:all 0.15s}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:28px}
.accom-card{border:1px solid rgba(245,197,0,0.25);border-radius:10px;overflow:hidden;margin-bottom:10px}
.accom-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background 0.15s}
.accom-body{padding:18px 18px 6px;background:rgba(0,0,0,0.2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.section-head{font-size:16px;font-weight:bold;color:#f5c500;margin-bottom:18px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid rgba(245,197,0,0.3);padding-bottom:8px}
.live-bar{background:rgba(245,197,0,0.1);border:1px solid rgba(245,197,0,0.4);border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:16px;align-items:center}
.warn-box{background:rgba(245,197,0,0.1);border:1px solid rgba(245,197,0,0.4);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#f5c500}
.agent-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);padding:8px 12px;margin-bottom:6px;border-radius:6px}
.client-box{background:rgba(92,239,128,0.08);border:1px solid rgba(92,239,128,0.2);padding:8px 12px;border-radius:6px;line-height:1.8}
.badge{width:28px;height:28px;border-radius:50%;background:#f5c500;color:#0d4a1a;font-weight:bold;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#0d4a1a;border:2px solid #f5c500;border-radius:16px;padding:32px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto}
.settings-section{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:18px;margin-bottom:16px}
.settings-section-title{font-size:12px;font-weight:bold;color:#f5c500;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;border-bottom:1px solid rgba(245,197,0,0.3);padding-bottom:6px}
.rates-status{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}

/* PRINT-SPECIFIC: force background colors */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  .no-print{display:none!important}
  body{background:#fff;margin:0}
  .doc-wrap{max-width:100%!important;box-shadow:none!important}
  .doc-cover{background:linear-gradient(160deg,#0d4a1a 0%,#1a6b2a 60%,#0a3012 100%)!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .doc-footer{background:#0d4a1a!important;-webkit-print-color-adjust:exact!important}
  .doc-section-title{color:#0d4a1a!important;border-bottom-color:#f5c500!important}
  .doc-table th{background:#0d4a1a!important;color:#f5c500!important}
  .inc-header-green{background:#0d4a1a!important;color:#f5c500!important}
  .inc-header-red{background:#7f1d1d!important;color:#fff!important}
  .day-circle{background:#0d4a1a!important;border-color:#f5c500!important}
  .quick-info-bar{background:#f0f7ea!important}
  .pricing-total-row td{background:#e8f5e0!important}
  .itin-left-border{border-left-color:#f5c500!important}
  .doc-info-label{background:#f0f7ea!important}
  .doc-info-val{background:#f9fdf5!important}
  .stop-header{background:#0d4a1a!important;color:#f5c500!important}
  .park-included-row{background:#e8f5e0!important}
  .park-own-row{background:#fff8e1!important}
}

/* DOC STYLES */
.doc-wrap{background:#fff;color:#1a1a1a;max-width:860px;margin:0 auto;font-family:Georgia,serif}
.doc-cover{background:linear-gradient(160deg,#0d4a1a 0%,#1a6b2a 60%,#0a3012 100%);color:#fff;padding:50px 50px 40px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.doc-body{padding:40px 50px}
.doc-section{margin-bottom:32px}
.doc-section-title{font-size:15px;font-weight:bold;color:#0d4a1a;border-bottom:3px solid #f5c500;padding-bottom:8px;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.doc-info-grid{display:grid;grid-template-columns:1fr 1fr}
.doc-info-label{padding:7px 12px;font-size:13px;color:#777;font-weight:bold;background:#f0f7ea;border-bottom:1px solid #d8edd0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.doc-info-val{padding:7px 12px;font-size:13px;color:#1a1a1a;background:#f9fdf5;border-bottom:1px solid #d8edd0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.doc-table{width:100%;border-collapse:collapse;font-size:14px}
.doc-table th{padding:11px 13px;text-align:left;font-weight:bold;background:#0d4a1a;color:#f5c500;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.doc-table td{padding:10px 13px;border-bottom:1px solid #e8eee0}
.doc-table tr:nth-child(even) td{background:#f5faf0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.doc-footer{background:#0d4a1a;color:#fff;border-radius:10px;padding:28px 32px;margin-top:32px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.itin-day{margin-bottom:24px;display:flex;gap:18px}
.day-circle{flex-shrink:0;width:60px;height:60px;border-radius:50%;background:#0d4a1a;border:3px solid #f5c500;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.inc-box{border-radius:0 0 8px 8px;border:1px solid #d0e8c0;border-top:none;padding:14px 16px}
.exc-box{border-radius:0 0 8px 8px;border:1px solid #f0d0d0;border-top:none;padding:14px 16px}
.inc-exc-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
.stop-header{background:#0d4a1a;color:#f5c500;font-size:12px;font-weight:bold;padding:7px 14px;border-radius:6px 6px 0 0;letter-spacing:1px;text-transform:uppercase;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.park-included-row{background:#e8f5e0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.park-own-row{background:#fff8e1;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.quick-info-bar{background:#f0f7ea;border:1px solid #c0e0a0;border-radius:10px;padding:16px 20px;margin-bottom:32px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.inc-header-green{background:#0d4a1a;color:#f5c500;padding:9px 14px;border-radius:8px 8px 0 0;font-weight:bold;font-size:13px;text-transform:uppercase;letter-spacing:1px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.inc-header-red{background:#7f1d1d;color:#fff;padding:9px 14px;border-radius:8px 8px 0 0;font-weight:bold;font-size:13px;text-transform:uppercase;letter-spacing:1px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.pricing-total-row td{background:#e8f5e0!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
.itin-left-border{border-left:4px solid #f5c500;-webkit-print-color-adjust:exact;print-color-adjust:exact}

@media(max-width:600px){
  .grid2{grid-template-columns:1fr}
  .inc-exc-grid{grid-template-columns:1fr}
  .doc-body{padding:24px 20px}
  .doc-cover{padding:30px 20px}
  .quick-info-bar{grid-template-columns:1fr 1fr}
}

.back-to-hub{position:fixed;bottom:20px;right:20px;background:#0d4a1a;border:2px solid #f5c500;
  border-radius:30px;padding:10px 18px;color:#f5c500;font-size:13px;font-weight:bold;
  cursor:pointer;z-index:999;font-family:Georgia,serif;box-shadow:0 4px 16px rgba(0,0,0,0.4);
  text-decoration:none;display:flex;align-items:center;gap:8px;letter-spacing:0.5px}
.back-to-hub:hover{background:#1a6b2a}
@media print{.back-to-hub{display:none}}
</style>
</head>

function fmt(n){if(!n&&n!==0)return"—";return"KES "+Number(n).toLocaleString("en-KE",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return"TBC";try{return new Date(d+"T12:00:00").toLocaleDateString("en-KE",{day:"numeric",month:"long",year:"numeric"});}catch(e){return d;}}

function clientRate(a){
  const raw=Number(a.hotelRate)||0;
  if(a.rateType==="Agent Net"){const m=Number(a.agentMarkupPercent)||0;return raw*(1+m/100);}
  return raw;
}
function effectiveCPPN(a){
  const cr=clientRate(a);
  const occ=Number(a.occupantsPerRoom)||1;
  const base=a.pricingBasis==="per_room"?cr/occ:cr;
  // Flat supplement (legacy toggle or explicit supplement mode)
  const supp=(a.mealBillingMode==="supplement"||(!a.mealBillingMode&&a.mealSupplementEnabled))
    ?(Number(a.mealSupplement)||0):0;
  // Per-meal mode: sum only included meals
  const perMealTotal=a.mealBillingMode==="per_meal"
    ?Object.values(a.perMeal||{}).filter(m=>m.included).reduce((s,m)=>s+Number(m.rate||0),0)
    :0;
  // À la carte: food not in package — room base only, no meal charge
  return base+supp+perMealTotal;
}
function effectiveRoomCPPN(a){
  // room only, no supplement — used for display breakdown
  const cr=clientRate(a);
  const occ=Number(a.occupantsPerRoom)||1;
  return a.pricingBasis==="per_room"?cr/occ:cr;
}

// ── DISCOUNT CALCULATION ──────────────────────────────────────────────────
// Returns total discount per person (across all nights) for one accom stop
function calcAccomDiscount(a, pax){
  if(!a.discounts||a.discounts.length===0)return 0;
  const cpn=effectiveCPPN(a);
  const nights=Number(a.nights)||0;
  const grossCPP=cpn*nights;
  let totalDiscount=0;
  a.discounts.filter(d=>d.enabled).forEach(d=>{
    switch(d.type){
      case"free_night":{
        // buy X get Y free — saving = cpn * freeNights
        const free=Number(d.freeNights)||0;
        totalDiscount+=cpn*free;
        break;
      }
      case"share_discount":{
        // Nth person sharing room gets X% off
        // affectedPax = number of people in group getting the discount
        const pct=Number(d.discountPercent)||0;
        const affected=Number(d.affectedPax)||0;
        const totalPax=Number(pax)||1;
        // discount per person = (affected pax * discount) / total pax, spread over nights
        totalDiscount+=(cpn*(pct/100)*affected/totalPax)*nights;
        break;
      }
      case"group_discount":{
        // flat % off entire accom for this stop
        const pct=Number(d.discountPercent)||0;
        totalDiscount+=grossCPP*(pct/100);
        break;
      }
      case"long_stay":{
        // flat % off for long stay
        const pct=Number(d.discountPercent)||0;
        totalDiscount+=grossCPP*(pct/100);
        break;
      }
      case"custom":{
        if(d.customType==="percent"){
          totalDiscount+=grossCPP*(Number(d.discountPercent||0)/100);
        }else{
          // fixed KES per person total
          totalDiscount+=Number(d.fixedAmount)||0;
        }
        break;
      }
    }
  });
  return Math.min(totalDiscount,grossCPP); // never discount more than the cost
}

// ── CHILD PRICING HELPERS ──────────────────────────────────────────────────
// Returns the "effective adult-equivalent PAX" count for accom/transport pricing
// Infants: 0% of adult | Children: childRatePct% | YoungAdults: youngAdultRatePct%
function childAdjustedPax(form){
  const adults=Math.max(0,Number(form.pax)-Number(form.childrenTotal||0));
  const inf=Number(form.infants||0);
  const chld=Number(form.childrenAged||0);
  const yng=Number(form.youngAdults||0);
  const infantPct=Number(form.infantRatePct||0)/100;
  const childPct=Number(form.childRatePct||50)/100;
  const youngPct=Number(form.youngAdultRatePct||100)/100;
  return adults+(inf*infantPct)+(chld*childPct)+(yng*youngPct);
}

// Returns child adjustment for park fees (may differ from accom)
function childAdjustedParkPax(form){
  const adults=Math.max(0,Number(form.pax)-Number(form.childrenTotal||0));
  const inf=Number(form.infants||0);
  const chld=Number(form.childrenAged||0);
  const yng=Number(form.youngAdults||0);
  const infantPct=Number(form.childParkFeeInfantPct||0)/100;
  const childPct=Number(form.childParkFeeChildPct||50)/100;
  const youngPct=Number(form.childParkFeeYoungAdultPct||100)/100;
  return adults+(inf*infantPct)+(chld*childPct)+(yng*youngPct);
}

// ── DRIVER/GUIDE COST HELPERS ─────────────────────────────────────────────
// Returns total driver+guide cost per person (only when costBasis="client")
// ── VEHICLE COST PER PERSON ─────────────────────────────────────────────
// For per_vehicle pricing: total vehicle cost ÷ PAX
// Includes driver/guide costs that are marked as client-facing
function vehicleCostCPP(t, totalPax){
  if(!totalPax||totalPax<1)return 0;
  let vehicleTotal=0;

  if(t.pricingBasis==="per_vehicle"||(!t.pricingBasis&&!t.costPerPerson)){
    // Vehicle cost: rate × days × number of vehicles
    const rate=Number(t.vehicleCostPerDay)||0;
    const days=Number(t.vehicleDays)||1;
    const num=Number(t.numVehicles)||1;
    vehicleTotal=rate*days*num;
  } else if(t.pricingBasis==="per_person"){
    // Explicit per-person rate (e.g. SGR, shared shuttle)
    return Number(t.costPerPerson)||0;
  } else if(t.pricingBasis==="per_trip"){
    vehicleTotal=Number(t.vehicleCostPerDay)||0; // single trip cost
  } else {
    // Legacy fallback
    vehicleTotal=Number(t.costPerPerson||0)*totalPax;
  }

  // Add client-facing guide costs (driver is usually operator-only)
  if(t.guideIncluded&&t.guideCostBasis==="client"&&Number(t.guideDailyRate)>0){
    vehicleTotal+=Number(t.guideDailyRate)*Number(t.guideDays||1);
  }
  if(t.driverIncluded&&(t.driverCostBasis||"operator")==="client"&&Number(t.driverDailyRate)>0){
    vehicleTotal+=Number(t.driverDailyRate)*Number(t.driverDays||1);
  }

  return vehicleTotal/totalPax;
}

// Keep legacy helper for backwards compat
function driverGuideCPP(t, totalPax){ return 0; } // absorbed into vehicleCostCPP

function calcTotals(form,settings){
  const pax=Number(form.pax)||0;
  const margin=Number(form.serviceMarginPercent)||0;
  const adjPax=childAdjustedPax(form);
  const parkAdjPax=childAdjustedParkPax(form);

  // Accommodation — use adult-equivalent PAX ratio for child discount
  // We keep per-person rates as-is but note child adjustment in group total
  const accomCPP=form.accommodations.reduce((s,a)=>s+effectiveCPPN(a)*(Number(a.nights)||0),0);
  const discountCPP=form.accommodations.reduce((s,a)=>s+calcAccomDiscount(a,pax),0);

  // Child accom adjustment: difference between full-PAX and adjusted-PAX total, spread per person
  // e.g. if children get 50% off, the group total is less — we express as a per-person saving
  const accomGroupFull=accomCPP*pax;
  const accomGroupAdj=(accomCPP-discountCPP)*adjPax; // adjusted for children
  const childAccomSavingCPP=pax>0?(accomGroupFull-discountCPP*pax-accomGroupAdj)/pax:0;

  const transportCPP=form.transports.reduce((s,t)=>s+vehicleCostCPP(t,pax),0);
  const excursionCPP=form.excursions.reduce((s,x)=>s+(Number(x.costPerPerson)||0),0);

  // Park fees — group-aware: adults at full rate, children at concession rate, infants free
  const adults=Math.max(0,pax-Number(form.childrenTotal||0));
  const infants=Number(form.infants||0);
  const children=Number(form.childrenAged||0);
  const youngAdults=Number(form.youngAdults||0);
  const parkGroupTotal=form.parkFees.filter(p=>p.includedInPackage&&p.costPerPerson).reduce((s,p)=>{
    const adultRate=Number(p.costPerPerson)||0;
    const childRate=Number(p.childCostPerPerson)||adultRate*Number(form.childParkFeeChildPct||50)/100;
    const youngAdultRate=Number(p.youngAdultCostPerPerson)||adultRate;
    return s + adults*adultRate + infants*0 + children*childRate + youngAdults*youngAdultRate;
  },0);
  const parkIncCPP=pax>0?parkGroupTotal/pax:0;

  const sub=(accomCPP-discountCPP)+transportCPP+excursionCPP+parkIncCPP;
  const svc=sub*(margin/100);
  const total=sub+svc;
  const nights=form.accommodations.reduce((s,a)=>s+(Number(a.nights)||0),0);

  // Group total uses adjusted pax for accom/parks, full pax for transport/excursions
  const groupTransport=(transportCPP)*pax;
  const groupExcursion=excursionCPP*pax;
  const groupAccom=(accomCPP-discountCPP)*adjPax;
  const groupPark=parkGroupTotal; // already the full group total
  const groupSub=groupAccom+groupTransport+groupExcursion+groupPark;
  const groupSvc=groupSub*(margin/100);
  const totalGroup=groupSub+groupSvc;

  return{accomCPP,discountCPP,transportCPP,excursionCPP,parkIncCPP,serviceFeeCPP:svc,
    totalCPP:total,totalGroup,pax,totalNightsBooked:nights,
    adjPax,parkAdjPax,hasChildren:Number(form.childrenTotal||0)>0};
}

// Auto-suggest best vehicle(s) for a given PAX count
function suggestVehicles(pax){
  if(!pax||pax<1)return[];
  const fleet=VEHICLE_FLEET.filter(v=>v.capacity<99).sort((a,b)=>a.capacity-b.capacity);
  // Try single vehicle first
  const single=fleet.find(v=>v.capacity>=pax);
  if(single)return[{vehicle:single,count:1,totalCap:single.capacity}];
  // Multiple vehicles — use largest that fits most pax
  const largest=fleet[fleet.length-1];
  const count=Math.ceil(pax/largest.capacity);
  return[{vehicle:largest,count,totalCap:largest.capacity*count}];
}

// ── DATA LOADING FROM GOOGLE SHEETS ──────────────────────────────────────
async function loadSheetData(sheetId, scriptUrl){
  const base={rates:EMBEDDED_DATA.rates||[],parks:EMBEDDED_DATA.parks||[],hotels:EMBEDDED_DATA.hotels||[],seasons:EMBEDDED_DATA.seasons||[]};
  // Use the live script URL — check passed param first, then the constant
  const liveUrl=scriptUrl||SCRIPT_URL;
  try{
    if(liveUrl&&liveUrl.includes("script.google.com")){
      try{
        const res=await Promise.race([
          fetch(liveUrl+"?action=all"),
          new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),8000))
        ]);
        const data=await res.json();
        if(data&&data.rates&&data.rates.length>0){
          return{
            rates:     data.rates      ||base.rates,
            parks:     data.parks      ||base.parks,
            hotels:    data.hotels     ||base.hotels,
            seasons:   data.seasons    ||base.seasons,
            mealCards: data.mealCards  ||[]
          };
        }
      }catch(scriptErr){
        console.warn("Apps Script fetch failed, trying CSV fallback:",scriptErr.message);
      }
    }
    // Fallback: query each sheet tab as CSV via allorigins proxy
    const proxy="https://api.allorigins.win/raw?url=";
    const sheetBase="https://docs.google.com/spreadsheets/d/"+sheetId+"/gviz/tq?tqx=out:csv";
    const keys=["rates","parks","hotels","seasons"];
    const tabNames=["HotelRates","ParkFees","HotelsList","Seasons"];
    for(let i=0;i<keys.length;i++){
      try{
        const res=await Promise.race([
          fetch(proxy+encodeURIComponent(sheetBase+"&sheet="+tabNames[i])),
          new Promise((_,r)=>setTimeout(()=>r(new Error("t")),5000))
        ]);
        const text=await res.text();
        const parsed=parseCSV(text);
        if(parsed.length>0){base[keys[i]]=parsed;}
      }catch(e){continue;}
    }
  }catch(e){}
  return base;
}

function parseCSV(text){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=parseCSVRow(lines[0]).map(h=>h.trim().replace(/"/g,''));
  return lines.slice(1).map(line=>{
    const vals=parseCSVRow(line);
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/"/g,'').trim();});
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function parseCSVRow(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){result.push(cur);cur='';}
    else{cur+=line[i];}
  }
  result.push(cur);return result;
}

// ── HOTEL SELECTOR (uses sheet data) ──────────────────────────────────────
// Helper: normalize a rate string to a plain number string
function cleanRate(v){return v?(v+"").replace(/[^0-9.]/g,""):""}

// Helper: get all unique values for a column from rate rows, stripping extra whitespace/newlines
function colVals(rows,col){
  return [...new Set(rows.map(r=>{
    // try exact key first, then fuzzy match (handles \n in headers)
    let v=r[col];
    if(!v){const k=Object.keys(r).find(k=>k.replace(/\s+/g," ").trim()===col.replace(/\s+/g," ").trim());if(k)v=r[k];}
    return(v||"").trim();
  }).filter(Boolean))];
}
function getCol(r,col){
  let v=r[col];
  if(!v){const k=Object.keys(r).find(k=>k.replace(/\s+/g," ").trim()===col.replace(/\s+/g," ").trim());if(k)v=r[k];}
  return(v||"").trim();
}

function HotelSelector({accom,idx,updAccom,sheetData}){
  const rates=sheetData.rates||[];
  const hotelNames=[...new Set(rates.map(r=>getCol(r,"Hotel Name")).filter(Boolean))].sort();
  const hasRates=hotelNames.length>0;

  const hotelRows=rates.filter(r=>getCol(r,"Hotel Name")===accom.hotelName);
  const availRooms=colVals(hotelRows,"Room Type");
  const availMeals=colVals(hotelRows.filter(r=>getCol(r,"Room Type")===accom.roomType),"Meal Plan");
  const availSeasons=colVals(hotelRows.filter(r=>getCol(r,"Room Type")===accom.roomType&&getCol(r,"Meal Plan")===accom.mealPlan),"Season");

  // When hotel selected: set location, pick first room/meal/season
  const onHotelChange=v=>{
    updAccom(idx,"hotelName",v);
    const rows=rates.filter(r=>getCol(r,"Hotel Name")===v);
    const loc=rows[0]?getCol(rows[0],"Location / Destination"):"";
    if(loc)updAccom(idx,"hotelLocation",loc);
    const rooms=colVals(rows,"Room Type");
    if(rooms[0])updAccom(idx,"roomType",rooms[0]);
    const meals=colVals(rows.filter(r=>getCol(r,"Room Type")===(rooms[0]||accom.roomType)),"Meal Plan");
    if(meals[0])updAccom(idx,"mealPlan",meals[0]);
    const seasons=colVals(rows.filter(r=>getCol(r,"Room Type")===(rooms[0]||accom.roomType)&&getCol(r,"Meal Plan")===(meals[0]||accom.mealPlan)),"Season");
    const defaultSeason=seasons.includes("High Season")?"High Season":(seasons[0]||"High Season");
    updAccom(idx,"season",defaultSeason);
    // Immediately fill rate
    fillRate(v,rooms[0]||accom.roomType,meals[0]||accom.mealPlan,defaultSeason,rates);
  };

  const onRoomChange=v=>{
    updAccom(idx,"roomType",v);
    const meals=colVals(hotelRows.filter(r=>getCol(r,"Room Type")===v),"Meal Plan");
    if(meals.length&&!meals.includes(accom.mealPlan))updAccom(idx,"mealPlan",meals[0]);
    const m=meals.includes(accom.mealPlan)?accom.mealPlan:meals[0];
    const seasons=colVals(hotelRows.filter(r=>getCol(r,"Room Type")===v&&getCol(r,"Meal Plan")===m),"Season");
    const s=seasons.includes(accom.season)?accom.season:(seasons.includes("High Season")?"High Season":seasons[0]||accom.season);
    updAccom(idx,"season",s);
    fillRate(accom.hotelName,v,m,s,rates);
  };

  const onMealChange=v=>{
    updAccom(idx,"mealPlan",v);
    const seasons=colVals(hotelRows.filter(r=>getCol(r,"Room Type")===accom.roomType&&getCol(r,"Meal Plan")===v),"Season");
    const s=seasons.includes(accom.season)?accom.season:(seasons.includes("High Season")?"High Season":seasons[0]||accom.season);
    updAccom(idx,"season",s);
    fillRate(accom.hotelName,accom.roomType,v,s,rates);
  };

  const onSeasonChange=v=>{
    updAccom(idx,"season",v);
    fillRate(accom.hotelName,accom.roomType,accom.mealPlan,v,rates);
  };

  // ── Extract nationality-appropriate rate from a matched row ────────────
  const getNetRate=(row,nat)=>{
    if(!row)return"";
    const r=cleanRate(getCol(row,"Resident Net (KES)"));
    const eac=cleanRate(getCol(row,"EAC Net (KES)"));
    const nr=cleanRate(getCol(row,"Non-Resident Net (KES)"));
    const leg=cleanRate(getCol(row,"Agent Net Rate (KES)")||getCol(row,"Agent Net Rate\n(KES)"));
    if(nat==="Resident")return r||leg;
    if(nat==="EAC Resident")return eac||r||leg;
    return nr||leg;
  };
  const getRackRate=(row,nat)=>{
    if(!row)return"";
    const r=cleanRate(getCol(row,"Resident Rack (KES)"));
    const eac=cleanRate(getCol(row,"EAC Rack (KES)"));
    const nr=cleanRate(getCol(row,"Non-Resident Rack (KES)"));
    const leg=cleanRate(getCol(row,"Rack Rate (KES)")||getCol(row,"Rack Rate\n(KES)"));
    if(nat==="Resident")return r||leg;
    if(nat==="EAC Resident")return eac||r||leg;
    return nr||leg;
  };

  const fillRate=(hotel,room,meal,season,rateRows)=>{
    if(!hotel||hotel==="__manual__"||!room||!meal||!season)return;
    const match=rateRows.find(r=>
      getCol(r,"Hotel Name")===hotel&&
      getCol(r,"Room Type")===room&&
      getCol(r,"Meal Plan")===meal&&
      getCol(r,"Season")===season
    );
    if(!match)return;
    // Use the per-accom nationality override, else fall back to the global clientType passed via props
    const nat=accom.accomClientType||accom._globalClientType||"Non-Resident";
    const agentNet=getNetRate(match,nat);
    const rack=getRackRate(match,nat);
    const basis=getCol(match,"Pricing Basis")||getCol(match,"Pricing\nBasis")||"Per Person";
    const occ=getCol(match,"Occupants per Room")||getCol(match,"Pax per\nRoom")||getCol(match,"Occupants\nper Room")||"1";
    if(agentNet){updAccom(idx,"hotelRate",agentNet);updAccom(idx,"rateType","Agent Net");}
    else if(rack){updAccom(idx,"hotelRate",rack);updAccom(idx,"rateType","Rack Rate");}
    updAccom(idx,"pricingBasis",basis.toLowerCase().includes("room")?"per_room":"per_person");
    updAccom(idx,"occupantsPerRoom",Number(occ)||1);
    // Store all rates for the comparison banner
    updAccom(idx,"_allRates",{
      res:getNetRate(match,"Resident"),
      eac:getNetRate(match,"EAC Resident"),
      nr:getNetRate(match,"Non-Resident"),
      nrUsd:getCol(match,"Non-Resident Net (USD)")||""
    });
  };

  // Show matched rate info
  const matchedRow=accom.hotelName&&accom.hotelName!=="__manual__"?rates.find(r=>
    getCol(r,"Hotel Name")===accom.hotelName&&getCol(r,"Room Type")===accom.roomType&&
    getCol(r,"Meal Plan")===accom.mealPlan&&getCol(r,"Season")===accom.season
  ):null;

  if(!hasRates){
    return e("div",{style:{gridColumn:"1/-1",padding:"10px 14px",background:"rgba(245,197,0,0.08)",border:"1px dashed rgba(245,197,0,0.3)",borderRadius:8,fontSize:13,color:"rgba(255,255,255,0.5)"}},
      "ℹ️ No rates loaded yet. Open ⚙️ Settings → click Load Rates. You can also enter rates manually below."
    );
  }

  return e(React.Fragment,null,
    e("div",{style:{gridColumn:"1/-1",padding:"8px 12px",background:"rgba(92,239,128,0.06)",border:"1px solid rgba(92,239,128,0.15)",borderRadius:8,fontSize:12,color:"#5cef80",marginBottom:4}},
      "✓ "+hotelNames.length+" hotels in database — selecting hotel auto-fills all rates"
    ),
    // Hotel dropdown
    e("div",{style:{marginBottom:16}},
      e("label",{className:"field-label"},"Hotel / Camp Name"),
      e("select",{className:"sel",value:accom.hotelName,onChange:ev=>onHotelChange(ev.target.value)},
        e("option",{value:""},"— Select hotel —"),
        hotelNames.map(n=>e("option",{key:n,value:n},n)),
        e("option",{value:"__manual__"},"✏️ Enter manually...")
      )
    ),
    accom.hotelName==="__manual__"&&e("div",{style:{marginBottom:16}},
      e("label",{className:"field-label"},"Hotel Name"),
      e("input",{className:"inp",value:accom._manualName||"",placeholder:"Type hotel name",
        onChange:ev=>{updAccom(idx,"hotelName","__manual__");updAccom(idx,"_manualName",ev.target.value);}})
    ),
    // Room Type — from sheet
    availRooms.length>0&&e("div",{style:{marginBottom:16}},
      e("label",{className:"field-label"},"Room Type"),
      e("select",{className:"sel",value:accom.roomType,onChange:ev=>onRoomChange(ev.target.value)},
        availRooms.map(r=>e("option",{key:r,value:r},r))
      )
    ),
    // Meal Plan — from sheet
    availMeals.length>0&&e("div",{style:{marginBottom:16}},
      e("label",{className:"field-label"},"Meal Plan"),
      e("select",{className:"sel",value:accom.mealPlan,onChange:ev=>onMealChange(ev.target.value)},
        availMeals.map(m=>e("option",{key:m,value:m},m))
      )
    ),
    // Season — from sheet
    availSeasons.length>0&&e("div",{style:{marginBottom:16}},
      e("label",{className:"field-label"},"Season"),
      e("select",{className:"sel",value:accom.season||"",onChange:ev=>onSeasonChange(ev.target.value)},
        availSeasons.map(s=>e("option",{key:s,value:s},s))
      )
    ),
    // Per-accommodation nationality override
    e("div",{style:{marginBottom:12,padding:"10px 14px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:8}},
      e("div",{style:{fontSize:11,fontWeight:"bold",color:"#a5b4fc",textTransform:"uppercase",letterSpacing:1,marginBottom:8}},
        "🌍 Guest Nationality (this stop) — controls which hotel rate is used"
      ),
      e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        [
          {v:"Non-Resident",l:"✈️ International",c:"#f5c500"},
          {v:"EAC Resident",l:"🌍 EAC Resident",c:"#60a5fa"},
          {v:"Resident",l:"🇰🇪 Kenyan Resident",c:"#4ade80"},
        ].map(({v,l,c})=>
          e("button",{key:v,onClick:()=>{
            updAccom(idx,"accomClientType",v);
            // Refill rate with new nationality
            if(accom.hotelName&&accom.hotelName!=="__manual__"&&accom.roomType&&accom.mealPlan&&accom.season){
              fillRate(accom.hotelName,accom.roomType,accom.mealPlan,accom.season,rates);
            }
          },
            style:{flex:1,padding:"7px 10px",border:"2px solid",
              borderColor:(accom.accomClientType||accom._globalClientType||"Non-Resident")===v?c:"rgba(255,255,255,0.15)",
              borderRadius:8,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:12,fontWeight:"bold",
              background:(accom.accomClientType||accom._globalClientType||"Non-Resident")===v?`rgba(${v==="Non-Resident"?"245,197,0":v==="EAC Resident"?"96,165,250":"74,222,128"},0.12)`:"transparent",
              color:(accom.accomClientType||accom._globalClientType||"Non-Resident")===v?c:"rgba(255,255,255,0.45)",
              transition:"all 0.15s"}},l
          )
        )
      ),
      e("div",{style:{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:5}},
        "Default follows the global client type set in Trip Details. Override here if this stop has a different nationality mix."
      )
    ),
    // Show all three nationality rates from the sheet
    matchedRow&&e("div",{style:{gridColumn:"1/-1",padding:"10px 14px",background:"rgba(92,239,128,0.06)",border:"1px solid rgba(92,239,128,0.2)",borderRadius:8,fontSize:12,marginBottom:4}},
      e("div",{style:{color:"#5cef80",fontWeight:"bold",marginBottom:6}},"📊 All nationality rates from sheet — applied rate highlighted:"),
      e("div",{style:{display:"flex",gap:16,flexWrap:"wrap"}},
        ...[
          {nat:"Resident",l:"🇰🇪 Resident",col:"#4ade80"},
          {nat:"EAC Resident",l:"🌍 EAC",col:"#60a5fa"},
          {nat:"Non-Resident",l:"✈️ International",col:"#f5c500"},
        ].map(({nat,l,col})=>{
          const net=getNetRate(matchedRow,nat);
          const nrUsd=nat==="Non-Resident"?(getCol(matchedRow,"Non-Resident Net (USD)")?"USD "+getCol(matchedRow,"Non-Resident Net (USD)")+" → ":""):"";
          const active=(accom.accomClientType||accom._globalClientType||"Non-Resident")===nat;
          return e("div",{key:nat,style:{
            padding:"5px 10px",borderRadius:6,
            background:active?`rgba(${nat==="Non-Resident"?"245,197,0":nat==="EAC Resident"?"96,165,250":"74,222,128"},0.15)`:"rgba(255,255,255,0.04)",
            border:"1px solid",borderColor:active?col:"rgba(255,255,255,0.08)"}},
            e("div",{style:{fontSize:10,color:active?col:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}},l+(active?" ← ACTIVE":"")),
            e("div",{style:{color:active?"#fff":"rgba(255,255,255,0.5)",fontWeight:active?"bold":"normal"}},
              nrUsd,e("span",{style:{color:active?col:"inherit"}},"KES "+( net||"—"))
            )
          );
        })
      )
    )
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────
function App(){
  const [form,setForm]=useState(defaultForm);
  const [settings,setSettings]=useState(defaultSettings);
  const [tab,setTab]=useState("basics");
  const [mode,setMode]=useState("form");
  const [generating,setGenerating]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [sheetData,setSheetData]=useState(EMBEDDED_DATA);
  const [loadStatus,setLoadStatus]=useState("loaded");
  const [expandAccom,setExpandAccom]=useState([0]);
  const [expandTransport,setExpandTransport]=useState([0]);
  const [expandPark,setExpandPark]=useState([]);

  const totals=calcTotals(form,settings);
  const upd=useCallback((f,v)=>setForm(p=>{
    const next={...p,[f]:v};
    if(f==="clientType"){
      next.parkFees=p.parkFees.map(pk=>({...pk,nationality:v}));
    }
    return next;
  }),[]);

  // Load rates on startup — embedded data already loaded, try live update silently
  useEffect(()=>{
    if(settings.sheetId){
      reloadRates(settings.sheetId);
    }
  },[]);

  const reloadRates=useCallback(async(sheetId)=>{
    setLoadStatus("loading");
    try{
      const data=await loadSheetData(sheetId, settings.scriptUrl||SCRIPT_URL);
      setSheetData(data);
      setLoadStatus((data.rates||[]).length>0?"loaded":"error");
    }catch(err){setLoadStatus("error");}
  },[settings.scriptUrl]);

  const saveSettings=useCallback((s)=>{
    setSettings(s);
    setForm(p=>({...p,serviceMarginPercent:s.defaultMargin}));
    if(s.sheetId!==settings.sheetId)reloadRates(s.sheetId);
  },[settings.sheetId,reloadRates]);

  // Accommodation
  const updAccom=useCallback((i,f,v)=>setForm(p=>({...p,accommodations:p.accommodations.map((a,idx)=>idx===i?{...a,[f]:v}:a)})),[]);
  const addAccom=useCallback(()=>{setForm(p=>({...p,accommodations:[...p.accommodations,newAccom()]}));setExpandAccom(p=>[...p,p.length]);},[]);
  const removeAccom=useCallback((i)=>{setForm(p=>{if(p.accommodations.length===1)return p;return{...p,accommodations:p.accommodations.filter((_,idx)=>idx!==i)};});setExpandAccom(p=>p.filter(x=>x!==i).map(x=>x>i?x-1:x));},[]);
  const toggleAccom=useCallback((i)=>setExpandAccom(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]),[]);

  // Transport
  const updTrans=useCallback((i,f,v)=>setForm(p=>({...p,transports:p.transports.map((t,idx)=>idx===i?{...t,[f]:v}:t)})),[]);
  const addTrans=useCallback(()=>{setForm(p=>({...p,transports:[...p.transports,newTransport()]}));setExpandTransport(p=>[...p,p.length]);},[]);
  const removeTrans=useCallback((i)=>{setForm(p=>{if(p.transports.length===1)return p;return{...p,transports:p.transports.filter((_,idx)=>idx!==i)};});setExpandTransport(p=>p.filter(x=>x!==i).map(x=>x>i?x-1:x));},[]);
  const toggleTrans=useCallback((i)=>setExpandTransport(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]),[]);

  // Excursions
  const updExc=useCallback((i,f,v)=>setForm(p=>({...p,excursions:p.excursions.map((x,idx)=>idx===i?{...x,[f]:v}:x)})),[]);
  const addExc=useCallback(()=>setForm(p=>({...p,excursions:[...p.excursions,{id:uid(),name:"",costPerPerson:""}]})),[]);
  const removeExc=useCallback((i)=>setForm(p=>({...p,excursions:p.excursions.filter((_,idx)=>idx!==i)})),[]);

  // Park fees
  const updPark=useCallback((i,f,v)=>setForm(p=>({...p,parkFees:p.parkFees.map((pk,idx)=>idx===i?{...pk,[f]:v}:pk)})),[]);
  const addPark=useCallback(()=>{setForm(p=>({...p,parkFees:[...p.parkFees,newParkFee(p.clientType)]}));setExpandPark(p=>[...p,p.length]);},[]);
  const removePark=useCallback((i)=>{setForm(p=>({...p,parkFees:p.parkFees.filter((_,idx)=>idx!==i)}));setExpandPark(p=>p.filter(x=>x!==i).map(x=>x>i?x-1:x));},[]);
  const togglePark=useCallback((i)=>setExpandPark(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]),[]);

  const addDay=useCallback(()=>setForm(p=>({...p,itinerary:[...p.itinerary,{id:uid(),day:p.itinerary.length+1,title:"",description:""}]})),[]);

          )

const DISCOUNT_TEMPLATES=[
  {type:"free_night",   label:"🎁 Free Night Deal",     desc:"e.g. Book 3 nights, 4th night free"},
  {type:"share_discount",label:"👥 Sharing Discount",   desc:"e.g. 3rd person in triple room gets 30% off"},
  {type:"group_discount",label:"🎒 Group Discount",     desc:"e.g. 10% off for groups of 6+"},
  {type:"long_stay",    label:"🗓️ Long Stay Discount",  desc:"e.g. 7% off for 5+ nights"},
  {type:"custom",       label:"✏️ Custom Discount",     desc:"Enter any fixed or % discount manually"},
];

function newDiscount(type,accom){
  const base={id:uid(),type,enabled:true,label:""};
  switch(type){
    case"free_night":    return{...base,label:"4th Night Free",buyNights:3,freeNights:1};
    case"share_discount":return{...base,label:"3rd Person — 30% Off",discountPercent:30,affectedPax:1};
    case"group_discount":return{...base,label:"Group Discount 10%",discountPercent:10,minGroupSize:6};
    case"long_stay":     return{...base,label:"Long Stay 7% Off",discountPercent:7,minNights:5};
    case"custom":        return{...base,label:"Special Discount",customType:"percent",discountPercent:10,fixedAmount:0};
    default: return base;
  }
}

function DiscountSection({accom,idx,updAccom,pax,cpn,cpp}){
  const discounts=accom.discounts||[];
  const [showAdd,setShowAdd]=React.useState(false);

  const addDiscount=(type)=>{
    const d=newDiscount(type,accom);
    updAccom(idx,"discounts",[...discounts,d]);
    setShowAdd(false);
  };
  const removeDiscount=(did)=>updAccom(idx,"discounts",discounts.filter(d=>d.id!==did));
  const updDiscount=(did,field,val)=>updAccom(idx,"discounts",discounts.map(d=>d.id===did?{...d,[field]:val}:d));
  const toggleDiscount=(did)=>updAccom(idx,"discounts",discounts.map(d=>d.id===did?{...d,enabled:!d.enabled}:d));

  const totalSaving=calcAccomDiscount(accom,pax);
  const netCPP=cpp-totalSaving;

  return e("div",{style:{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:12,marginTop:4}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:discounts.length?10:0}},
      e("div",{style:{fontSize:12,fontWeight:"bold",color:totalSaving>0?"#f5c500":"rgba(255,255,255,0.4)",letterSpacing:1,textTransform:"uppercase"}},
        totalSaving>0?"🏷️ Discounts Applied — saving "+fmt(totalSaving)+"/pax":"🏷️ Discounts / Special Deals"
      ),
      e("button",{onClick:()=>setShowAdd(p=>!p),
        style:{fontSize:12,padding:"4px 12px",border:"1px solid rgba(245,197,0,0.35)",borderRadius:6,

    showAdd&&e("div",{style:{background:"rgba(0,0,0,0.25)",border:"1px solid rgba(245,197,0,0.2)",borderRadius:8,padding:12,marginBottom:10}},

      e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
        DISCOUNT_TEMPLATES.map(t=>
          e("div",{key:t.type,onClick:()=>addDiscount(t.type),
            style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",
              borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",
              cursor:"pointer",transition:"all 0.15s"},
            onMouseEnter:ev=>{ev.currentTarget.style.background="rgba(245,197,0,0.1)";ev.currentTarget.style.borderColor="rgba(245,197,0,0.35)";},
            onMouseLeave:ev=>{ev.currentTarget.style.background="rgba(255,255,255,0.04)";ev.currentTarget.style.borderColor="rgba(255,255,255,0.1)";}
          },
            e("div",null,
              e("div",{style:{fontSize:13,fontWeight:"bold",color:"#fff"}},t.label),
              e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}},t.desc)
            ),
            e("span",{style:{color:"#f5c500",fontSize:18}},"›")
          )
        )
      )
    ),

    // Applied discounts
    discounts.map(d=>{
      const saving=calcAccomDiscount({...accom,discounts:[d]},pax);
      return e("div",{key:d.id,style:{
        background:d.enabled?"rgba(245,197,0,0.06)":"rgba(255,255,255,0.02)",
        border:"1px solid",borderColor:d.enabled?"rgba(245,197,0,0.25)":"rgba(255,255,255,0.08)",
        borderRadius:8,padding:"10px 14px",marginBottom:8}
      },
        // Header row
        e("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:d.enabled?8:0}},
          e("button",{onClick:()=>toggleDiscount(d.id),
            style:{width:36,height:20,borderRadius:10,border:"none",cursor:"pointer",
              background:d.enabled?"#f5c500":"rgba(255,255,255,0.15)",
              position:"relative",transition:"all 0.2s",flexShrink:0}},
            e("span",{style:{
              position:"absolute",top:2,width:16,height:16,borderRadius:"50%",background:"#fff",
              transition:"all 0.2s",left:d.enabled?"18px":"2px"}})
          ),
          e("input",{value:d.label,onChange:ev=>updDiscount(d.id,"label",ev.target.value),
            style:{flex:1,background:"transparent",border:"none",color:d.enabled?"#f5c500":"rgba(255,255,255,0.35)",
              fontWeight:"bold",fontSize:13,fontFamily:"Georgia,serif",outline:"none"}}),
          d.enabled&&saving>0&&e("span",{style:{fontSize:12,color:"#4ade80",fontWeight:"bold"}},
            "−"+fmt(saving)+"/pax"
          ),
          e("button",{onClick:()=>removeDiscount(d.id),
            style:{background:"none",border:"none",color:"rgba(239,68,68,0.6)",cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 4px"}},
            "×"
          )
        ),

        // Fields per type
        d.enabled&&e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 12px"}},
          d.type==="free_night"&&e(React.Fragment,null,
            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Nights to Buy"),
              e("input",{className:"inp",type:"number",min:1,value:d.buyNights,
                style:{fontSize:12,padding:"5px 8px"},
                onChange:ev=>updDiscount(d.id,"buyNights",ev.target.value)})
            ),
            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Free Nights"),
              e("input",{className:"inp",type:"number",min:1,value:d.freeNights,
                style:{fontSize:12,padding:"5px 8px"},
                onChange:ev=>updDiscount(d.id,"freeNights",ev.target.value)})
            ),
            e("div",{style:{display:"flex",alignItems:"flex-end",paddingBottom:4}},
              e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.5)",fontStyle:"italic"}},
                "Stay "+d.buyNights+"n pay "+(Number(d.buyNights))+"n, get "+d.freeNights+"n free"
              )
            )
          ),
          d.type==="share_discount"&&e(React.Fragment,null,
            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Discount %"),
              e("input",{className:"inp",type:"number",min:0,max:100,value:d.discountPercent,
                style:{fontSize:12,padding:"5px 8px"},
                onChange:ev=>updDiscount(d.id,"discountPercent",ev.target.value)})
            ),
            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"No. of PAX Getting Discount"),
              e("input",{className:"inp",type:"number",min:1,value:d.affectedPax,
                style:{fontSize:12,padding:"5px 8px"},
                onChange:ev=>updDiscount(d.id,"affectedPax",ev.target.value)})
            ),
            e("div",{style:{display:"flex",alignItems:"flex-end",paddingBottom:4}},
              e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.5)",fontStyle:"italic"}},
                d.affectedPax+" pax × "+d.discountPercent+"% off"
              )
            )
          ),
          (d.type==="group_discount"||d.type==="long_stay")&&e(React.Fragment,null,
            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Discount %"),
              e("input",{className:"inp",type:"number",min:0,max:100,value:d.discountPercent,
                style:{fontSize:12,padding:"5px 8px"},
                onChange:ev=>updDiscount(d.id,"discountPercent",ev.target.value)})
            ),
            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},
                d.type==="group_discount"?"Min Group Size":"Min Nights"),
              e("input",{className:"inp",type:"number",min:1,value:d.type==="group_discount"?d.minGroupSize:d.minNights,
                style:{fontSize:12,padding:"5px 8px"},
                onChange:ev=>updDiscount(d.id,d.type==="group_discount"?"minGroupSize":"minNights",ev.target.value)})
            ),
            e("div",{style:{display:"flex",alignItems:"flex-end",paddingBottom:4}},
              e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.5)",fontStyle:"italic"}},
                d.discountPercent+"% off full stop"
              )
            )
          ),
          d.type==="custom"&&e(React.Fragment,null,
            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Type"),
              e("select",{className:"sel",value:d.customType,style:{fontSize:12,padding:"5px 8px"},
                onChange:ev=>updDiscount(d.id,"customType",ev.target.value)},
                e("option",{value:"percent"},"Percentage (%)"),
                e("option",{value:"fixed"},"Fixed KES / person")
              )

            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},

        e("span",{style:{color:"#f87171"}},
          "Discount savings: −",fmt(totalSaving)
        )

      e("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:4}},

// ── TAB: HOTEL ─────────────────────────────────────────────────────────────
// ── MEAL BILLING SECTION ─────────────────────────────────────────────────
// Handles four hotel meal billing structures:
//   bundled   — meals fully in room rate (BB/HB/FB/AI). Nothing extra needed.
//   supplement— room quoted RO/separately; single flat KES/pax/night add-on
//   per_meal  — hotel charges per individual meal; agent picks breakfast/lunch/dinner
//   ala_carte — guests pay own food at hotel; excluded from package with optional estimate

const MEAL_MODE_OPTIONS=[
  {v:"bundled",   l:"🍱 Bundled in room rate",     desc:"BB / HB / FB / AI — meals in room price"},
  {v:"supplement",l:"🍽️ Single meal supplement",    desc:"Room Only + fixed KES/pax/night add-on"},
  {v:"per_meal",  l:"🥗 Charged per individual meal",desc:"Hotel quotes each meal separately — pick which to include"},
  {v:"ala_carte", l:"🍴 À la carte — guests pay own",desc:"Food excluded from package; guests settle at hotel"},
];

const DEFAULT_MEAL_ITEMS={
  breakfast:{included:true, rate:"", label:"Breakfast"},
  lunch:    {included:false,rate:"", label:"Lunch"},
  dinner:   {included:true, rate:"", label:"Dinner"},
  snacks:   {included:false,rate:"", label:"Afternoon Tea / Snacks"},
};

function MealBillingSection({accom,idx,updAccom}){
  const mode=accom.mealBillingMode||"bundled";
  const setMode=v=>{
    updAccom(idx,"mealBillingMode",v);
    // When switching to supplement, turn on the legacy flag for backwards compat
    updAccom(idx,"mealSupplementEnabled",v==="supplement");
    // Ensure perMeal exists
    if(v==="per_meal"&&!accom.perMeal)updAccom(idx,"perMeal",{...DEFAULT_MEAL_ITEMS});
    if(v==="ala_carte"&&!accom.alaCarte)updAccom(idx,"alaCarte",{estimatePerPersonPerDay:"",notes:""});
  };

  // Per-meal helpers
  const pm=accom.perMeal||DEFAULT_MEAL_ITEMS;
  const updPM=(key,field,val)=>{
    const updated={...pm,[key]:{...pm[key],[field]:val}};
    updAccom(idx,"perMeal",updated);
  };
  const perMealTotal=Object.values(pm).filter(m=>m.included).reduce((s,m)=>s+Number(m.rate||0),0);

  const modeColor={bundled:"rgba(255,255,255,0.35)",supplement:"#f5c500",per_meal:"#60a5fa",ala_carte:"#f87171"};
  const active=modeColor[mode]||"#f5c500";

  return e("div",{style:{marginBottom:12,padding:"12px 14px",background:"rgba(255,255,255,0.03)",border:"1px solid",borderColor:mode==="bundled"?"rgba(255,255,255,0.1)":active.replace(")",",0.35)").replace("rgb","rgba"),borderRadius:8}},
    // Header + mode selector
    e("div",{style:{marginBottom:10}},
      e("div",{style:{fontSize:12,fontWeight:"bold",textTransform:"uppercase",letterSpacing:1,color:active,marginBottom:8}},
        "🍽️ Meal Billing Mode"
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
        MEAL_MODE_OPTIONS.map(opt=>
          e("div",{key:opt.v,onClick:()=>setMode(opt.v),
            style:{padding:"8px 10px",borderRadius:8,cursor:"pointer",border:"2px solid",
              borderColor:mode===opt.v?modeColor[opt.v]:"rgba(255,255,255,0.1)",
              background:mode===opt.v?`rgba(${opt.v==="bundled"?"255,255,255":opt.v==="supplement"?"245,197,0":opt.v==="per_meal"?"96,165,250":"248,113,113"},0.08)`:"rgba(255,255,255,0.02)"}},
            e("div",{style:{fontSize:12,fontWeight:"bold",color:mode===opt.v?modeColor[opt.v]:"rgba(255,255,255,0.55)",marginBottom:2}},opt.l),
            e("div",{style:{fontSize:10,color:"rgba(255,255,255,0.35)",lineHeight:1.4}},opt.desc)
          )
        )
      )
    ),

    // SUPPLEMENT MODE fields
    mode==="supplement"&&e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 12px",marginTop:4}},
      e("div",null,
        e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Supplement Label"),
        e("input",{className:"inp",value:accom.mealSupplementLabel||"",style:{fontSize:12,padding:"5px 8px"},
          placeholder:"e.g. Full Board Supplement",
          onChange:ev=>updAccom(idx,"mealSupplementLabel",ev.target.value)})
      ),
      e("div",null,
        e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"KES / Person / Night"),
        e("input",{className:"inp",type:"number",value:accom.mealSupplement||"",style:{fontSize:12,padding:"5px 8px"},
          placeholder:"0.00",
          onChange:ev=>updAccom(idx,"mealSupplement",ev.target.value)})
      ),
      e("div",{style:{display:"flex",alignItems:"flex-end",paddingBottom:4}},
        e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.5)",fontStyle:"italic"}},
          accom.mealSupplement&&accom.nights
            ?"+ "+fmt(Number(accom.mealSupplement)*Number(accom.nights))+" total/pax"
            :"enter rate above"
        )
      )
    ),

    // PER-MEAL MODE fields
    mode==="per_meal"&&e("div",{style:{marginTop:6}},
      e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:8,lineHeight:1.6}},
        "Toggle each meal on/off, enter the hotel's charge per person per night. Included meals are added to the package price."
      ),
      e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
        Object.entries(pm).map(([key,meal])=>
          e("div",{key,style:{display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr",gap:"0 10px",alignItems:"center",
            padding:"8px 10px",borderRadius:6,background:meal.included?"rgba(96,165,250,0.08)":"rgba(255,255,255,0.02)",
            border:"1px solid",borderColor:meal.included?"rgba(96,165,250,0.25)":"rgba(255,255,255,0.07)"}},
            // Toggle
            e("button",{onClick:()=>updPM(key,"included",!meal.included),
              style:{width:36,height:20,borderRadius:10,border:"none",cursor:"pointer",
                background:meal.included?"#60a5fa":"rgba(255,255,255,0.12)",position:"relative",transition:"all 0.2s",flexShrink:0}},
              e("span",{style:{position:"absolute",top:2,width:16,height:16,borderRadius:"50%",background:"#fff",
                transition:"all 0.2s",left:meal.included?"18px":"2px"}})
            ),
            // Meal label
            e("div",null,
              e("input",{value:meal.label,onChange:ev=>updPM(key,"label",ev.target.value),
                style:{background:"transparent",border:"none",outline:"none",fontFamily:"Georgia,serif",
                  fontSize:12,fontWeight:"bold",color:meal.included?"#60a5fa":"rgba(255,255,255,0.4)",width:"100%"}})
            ),
            // Rate field
            e("div",null,
              meal.included&&e("input",{className:"inp",type:"number",value:meal.rate,
                style:{fontSize:12,padding:"5px 8px"},
                placeholder:"KES/pax/night",
                onChange:ev=>updPM(key,"rate",ev.target.value)})
            ),
            // Running total hint
            e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)",fontStyle:"italic",textAlign:"right"}},
              meal.included&&Number(meal.rate)>0?fmt(Number(meal.rate)):""
            )
          )
        )
      ),
      // Total
      perMealTotal>0&&e("div",{style:{marginTop:8,padding:"6px 10px",background:"rgba(96,165,250,0.1)",borderRadius:6,
        display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:"bold"}},
        e("span",{style:{color:"rgba(255,255,255,0.6)"}},"Total meals/pax/night:"),
        e("span",{style:{color:"#60a5fa"}},fmt(perMealTotal))
      ),
      e("div",{style:{marginTop:6,fontSize:11,color:"rgba(255,255,255,0.4)",fontStyle:"italic"}},
        "📋 On quote: each included meal listed separately with individual rates, total added to package price."
      )
    ),

    // À LA CARTE MODE fields
    mode==="ala_carte"&&e("div",{style:{marginTop:6}},
      e("div",{style:{padding:"8px 12px",background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:6,fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:8}},
        "⚠️ Food ",e("b",null,"not included")," in package price. Guests pay their meals directly at the hotel. This will appear under Exclusions on the quote."
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}},
        e("div",null,
          e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Estimated Food Budget / Person / Day (optional)"),
          e("input",{className:"inp",type:"number",
            value:(accom.alaCarte||{}).estimatePerPersonPerDay||"",
            style:{fontSize:12,padding:"5px 8px"},
            placeholder:"KES — shown on quote as guidance",
            onChange:ev=>updAccom(idx,"alaCarte",{...(accom.alaCarte||{}),estimatePerPersonPerDay:ev.target.value})})
        ),
        e("div",null,
          e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Note for Client"),
          e("input",{className:"inp",
            value:(accom.alaCarte||{}).notes||"",
            style:{fontSize:12,padding:"5px 8px"},
            placeholder:"e.g. Restaurant open 6:30–9:30am, 12–2pm, 7–9pm",
            onChange:ev=>updAccom(idx,"alaCarte",{...(accom.alaCarte||{}),notes:ev.target.value})})
        )
      )
    )
  );
}

// ── MEAL CARD SECTION ─────────────────────────────────────────────────────
// "Complementary meal card" = hotel offers a complimentary dining credit/card
// separate from the included meal plan. e.g. "complimentary dinner voucher",
// "welcome cocktail card", "free breakfast upgrade", "sundowner credit".
// These have a face value (what the client perceives), may or may not cost
// the agent anything, and should appear on the quote as a benefit.

const MEAL_CARD_TYPES=[
  {type:"breakfast",label:"🍳 Complimentary Breakfast",desc:"Free breakfast per stay or per night"},
  {type:"dinner",label:"🍽️ Complimentary Dinner Voucher",desc:"Free dinner credit"},
  {type:"sundowner",label:"🌅 Sundowner / Welcome Cocktail",desc:"Complimentary drinks on arrival"},
  {type:"lunch",label:"🥗 Complimentary Lunch",desc:"Free lunch credit"},
  {type:"full_board_upgrade",label:"⭐ Meal Plan Upgrade",desc:"e.g. BB upgraded to HB at no charge"},
  {type:"dining_credit",label:"💳 Dining Credit / F&B Voucher",desc:"Fixed KES credit towards any F&B"},
  {type:"custom",label:"✏️ Custom Meal Benefit",desc:"Enter your own description"},
];

function MealCardSection({accom,idx,updAccom}){
  const cards=accom.mealCards||[];
  const [showAdd,setShowAdd]=React.useState(false);

  const addCard=(type)=>{
    const template=MEAL_CARD_TYPES.find(t=>t.type===type)||MEAL_CARD_TYPES[MEAL_CARD_TYPES.length-1];
    const newCard={
      id:uid(),type,label:template.label,
      enabled:true,
      scope:"per_stay",       // per_stay | per_night | per_person_per_night
      faceValue:"",           // KES face value shown to client (0 = no value shown)
      agentCost:"0",          // actual cost to agent (usually 0 for complimentary)
      costBasis:"operator",   // operator = agent bears it | included = in client price
      notes:"",
      sheetRef:"",            // optional: ref to hotel contract sheet row
    };
    updAccom(idx,"mealCards",[...cards,newCard]);
    setShowAdd(false);
  };
  const removeCard=(id)=>updAccom(idx,"mealCards",cards.filter(c=>c.id!==id));
  const updCard=(id,field,val)=>updAccom(idx,"mealCards",cards.map(c=>c.id===id?{...c,[field]:val}:c));
  const toggleCard=(id)=>updAccom(idx,"mealCards",cards.map(c=>c.id===id?{...c,enabled:!c.enabled}:c));

  const totalFaceValue=cards.filter(c=>c.enabled).reduce((s,c)=>s+Number(c.faceValue||0),0);

  return e("div",{style:{marginBottom:12,padding:"12px 14px",background:"rgba(34,197,94,0.05)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:8}},
    // Header
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:cards.length?10:0}},
      e("div",{style:{fontSize:12,fontWeight:"bold",textTransform:"uppercase",letterSpacing:1,
        color:totalFaceValue>0?"#4ade80":"rgba(255,255,255,0.4)"}},
        "🎁 Complimentary Meal Card / F&B Benefits",
        totalFaceValue>0&&e("span",{style:{fontSize:11,fontWeight:"normal",marginLeft:8,color:"#4ade80"}},
          "— face value: KES "+totalFaceValue.toLocaleString()
        )
      ),
      e("button",{onClick:()=>setShowAdd(p=>!p),
        style:{fontSize:12,padding:"4px 12px",border:"1px solid rgba(34,197,94,0.35)",borderRadius:6,
          background:showAdd?"rgba(34,197,94,0.15)":"rgba(34,197,94,0.07)",color:"#4ade80",
          cursor:"pointer",fontFamily:"Georgia,serif"}},
        showAdd?"Cancel":"+ Add Meal Benefit"
      )
    ),

    // Hint when empty
    cards.length===0&&!showAdd&&e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.3)",paddingTop:2}},
      "Use this for hotel-issued complimentary meal cards, F&B credits, welcome drinks, dinner vouchers, or meal plan upgrades."
    ),

    // Template picker
    showAdd&&e("div",{style:{background:"rgba(0,0,0,0.2)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:8,padding:12,marginBottom:8}},

            e("div",null,
              e("label",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}},"Actual Cost to Agent"),

            e("div",null,

}

function TabHotel({form,updAccom,addAccom,removeAccom,toggleAccom,expandAccom,nightsMismatch,totals,sheetData,settings}){
  return e("div",null,
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      e("div",{className:"section-head",style:{margin:0}},"Accommodation Stops"),
      e("button",{className:"btn-outline",onClick:addAccom},"+ Add Stop")
    ),
    nightsMismatch&&e("div",{className:"warn-box"},"⚠️ Nights booked (",totals.totalNightsBooked,") ≠ total trip nights (",form.totalNights,")"),
    form.accommodations.map((a,i)=>{
      const isOpen=expandAccom.includes(i);
      const cpp=effectiveCPPN(a)*(Number(a.nights)||0);
      const rawRate=Number(a.hotelRate)||0;
      const isAgent=a.rateType==="Agent Net";
      const markup=Number(a.agentMarkupPercent)||0;
      const cr=isAgent?rawRate*(1+markup/100):rawRate;
      const occ=Number(a.occupantsPerRoom)||1;
      const isRoom=a.pricingBasis==="per_room";
      const cpn=isRoom?cr/occ:cr;
      const displayName=a.hotelName==="__manual__"?(a._manualName||""):a.hotelName;

      return e("div",{key:a.id,className:"accom-card"},
        e("div",{className:"accom-header",style:{background:isOpen?"rgba(245,197,0,0.12)":"rgba(255,255,255,0.04)"},onClick:()=>toggleAccom(i)},
          e("div",{style:{display:"flex",alignItems:"center",gap:12}},
            e("div",{className:"badge"},i+1),
            e("div",null,
              e("div",{style:{fontWeight:"bold",fontSize:14}},"Stop "+(i+1)+": "+(displayName||e("span",{style:{color:"#888",fontStyle:"italic"}},"Hotel not set"))),
              e("div",{style:{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:2}},(a.hotelLocation||"Location TBC")+" · "+a.nights+"n · "+a.mealPlan+(cpp?" · "+fmt(cpp)+"/pax":""),
                isAgent&&rawRate>0?e("span",{style:{color:"#f87171",fontSize:11,marginLeft:6}}," 🔒+"+markup+"%"):null)
            )
          ),
          e("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            form.accommodations.length>1&&e("button",{className:"btn-danger",onClick:ev=>{ev.stopPropagation();removeAccom(i);}},"Remove"),
            e("span",{style:{color:"#f5c500",fontSize:16,transform:isOpen?"rotate(180deg)":"none",display:"inline-block",transition:"0.2s"}},"▾")
          )
        ),
        isOpen&&e("div",{className:"accom-body"},
          e("div",{className:"grid2"},
            e(HotelSelector,{accom:{...a,_globalClientType:form.clientType},idx:i,updAccom,sheetData}),
            // Only show manual location if not auto-filled from sheet
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Location"),e("input",{className:"inp",value:a.hotelLocation,onChange:ev=>updAccom(i,"hotelLocation",ev.target.value),placeholder:"e.g. Masai Mara"})),
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Meal Plan"),
              e("select",{className:"sel",value:a.mealPlan,onChange:ev=>updAccom(i,"mealPlan",ev.target.value)},
                Object.entries(MEAL_PLANS).map(([k,v])=>e("option",{key:k,value:k},k+" — "+v)))),
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Rate Type"),
              e("select",{className:"sel",value:a.rateType,onChange:ev=>updAccom(i,"rateType",ev.target.value)},
                RATE_TYPES.map(r=>e("option",{key:r,value:r},r)))),
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Pricing Basis"),
              e("select",{className:"sel",value:a.pricingBasis,onChange:ev=>updAccom(i,"pricingBasis",ev.target.value)},
                e("option",{value:"per_person"},"Per Person Per Night"),
                e("option",{value:"per_room"},"Per Room Per Night"))),
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},isAgent?(isRoom?"Agent Net / Room / Night (KES)":"Agent Net / Person / Night (KES)"):(isRoom?"Rate / Room (KES)":"Rate / Person (KES)")),
              e("input",{className:"inp",type:"number",value:a.hotelRate,onChange:ev=>updAccom(i,"hotelRate",ev.target.value),placeholder:"0.00"})),
            isRoom&&e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Occupants per Room"),
              e("input",{className:"inp",type:"number",value:a.occupantsPerRoom,onChange:ev=>updAccom(i,"occupantsPerRoom",ev.target.value),placeholder:"2"})),
            isAgent&&e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Markup % → Client Rate"),
              e("input",{className:"inp",type:"number",value:a.agentMarkupPercent,onChange:ev=>updAccom(i,"agentMarkupPercent",ev.target.value),placeholder:"20"})),
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Nights at This Stop"),
              e("input",{className:"inp",type:"number",value:a.nights,onChange:ev=>updAccom(i,"nights",ev.target.value)}))
          ),
          // ── Meal Billing Mode ────────────────────────────────────────────────
          e(MealBillingSection,{accom:a,idx:i,updAccom}),
          // ── Complementary Meal Cards ──────────────────────────────────────────
          e(MealCardSection,{accom:a,idx:i,updAccom}),
          isAgent&&rawRate>0&&e("div",{className:"agent-box",style:{marginBottom:6}},
            e("div",{style:{color:"#f87171",fontWeight:"bold",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:4}},"🔒 Internal Only — NOT shown to client"),
            e("div",{style:{color:"rgba(255,255,255,0.7)",fontSize:13}},
              "Net: ",e("b",{style:{color:"#fca5a5"}},fmt(rawRate)),
              " + ",markup,"% markup → Client: ",e("b",{style:{color:"#fca5a5"}},fmt(cr)),
              isRoom?e("span",null," ÷ "+occ+" = "+fmt(cpn)+"/pax/night"):null
            )
          ),
          e("div",{className:"client-box",style:{marginBottom:12,fontSize:13}},
            e("b",{style:{color:"#5cef80",display:"block",marginBottom:4}},"✓ Client Rate"),
            isRoom&&e("div",null,fmt(cr)+"/room ÷ "+occ+" sharing = "+fmt(effectiveRoomCPPN(a))+"/pax/night"),
            // Supplement mode
            (a.mealBillingMode==="supplement"||((!a.mealBillingMode)&&a.mealSupplementEnabled))&&Number(a.mealSupplement)>0&&e("div",{style:{color:"rgba(255,255,255,0.7)",marginTop:2}},
              "Room: ",fmt(effectiveRoomCPPN(a))," + ",(a.mealSupplementLabel||"Meal Supplement"),": ",
              e("b",{style:{color:"#f5c500"}},fmt(Number(a.mealSupplement))),
              " = ",e("b",{style:{color:"#5cef80"}},fmt(effectiveCPPN(a))),"/pax/night"
            ),
            // Per-meal mode breakdown
            a.mealBillingMode==="per_meal"&&e("div",{style:{marginTop:3}},
              e("div",{style:{color:"rgba(255,255,255,0.6)",fontSize:12,marginBottom:3}},"Room: ",fmt(effectiveRoomCPPN(a)),"/pax/night + meals:"),
              e("div",{style:{display:"flex",gap:10,flexWrap:"wrap",fontSize:12}},
                Object.entries(a.perMeal||{}).filter(([,m])=>m.included&&Number(m.rate)>0).map(([key,m])=>
                  e("span",{key,style:{color:"#f5c500"}},m.label||key,": ",fmt(Number(m.rate)))
                )
              ),
              e("div",{style:{color:"#5cef80",fontWeight:"bold",marginTop:3}},
                "Total/pax/night: ",fmt(effectiveCPPN(a))
              )
            ),
            // À la carte
            a.mealBillingMode==="ala_carte"&&e("div",{style:{marginTop:3,fontSize:12,color:"rgba(255,255,255,0.5)",fontStyle:"italic"}},
              "⚠️ Meals not included — guests pay at hotel. ",
              Number(a.alaCarte?.estimatePerPersonPerDay)>0&&e("span",{style:{color:"#f5c500"}},"Est. ",fmt(Number(a.alaCarte.estimatePerPersonPerDay)),"/person/day")
            ),
            // Show complimentary meal card value if any
            (a.mealCards||[]).filter(mc=>mc.enabled&&Number(mc.faceValue)>0).length>0&&e("div",{style:{marginTop:4,padding:"4px 8px",background:"rgba(34,197,94,0.08)",borderRadius:5,fontSize:12}},
              "🎁 Complimentary: ",(a.mealCards||[]).filter(mc=>mc.enabled).map(mc=>mc.label||mc.type).join(" + "),
              " (face value: KES ",(a.mealCards||[]).filter(mc=>mc.enabled).reduce((s,mc)=>s+Number(mc.faceValue||0),0).toLocaleString(),")"
            ),
            e("div",null,"Subtotal per person ("+a.nights+"n): ",e("b",{style:{color:"#5cef80",fontSize:14}},cpp?fmt(cpp):"—"))
          ),
          e(DiscountSection,{accom:a,idx:i,updAccom,pax:form.pax,cpn,cpp})
        )
      );
    }),
    form.accommodations.length>1&&e("div",{style:{marginTop:12,background:"rgba(245,197,0,0.06)",border:"1px solid rgba(245,197,0,0.2)",borderRadius:10,padding:14}},
      e("div",{style:{fontWeight:"bold",color:"#f5c500",marginBottom:10,fontSize:13}},"📊 Summary"),
      e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},
        e("thead",null,e("tr",{style:{borderBottom:"1px solid rgba(245,197,0,0.3)"}},
          ["#","Hotel","Location","MP","Nights","Client Rate/Pax"].map(h=>
            e("th",{key:h,style:{padding:"6px 8px",textAlign:h==="Client Rate/Pax"?"right":h==="Nights"?"center":"left",color:"rgba(255,255,255,0.5)",fontWeight:"normal"}},h))
        )),
        e("tbody",null,
          form.accommodations.map((a,i)=>{
            const cpp=effectiveCPPN(a)*(Number(a.nights)||0);
            const dn=a.hotelName==="__manual__"?(a._manualName||""):a.hotelName;
            return e("tr",{key:a.id,style:{borderBottom:"1px solid rgba(255,255,255,0.05)"}},
              e("td",{style:{padding:"7px 8px",color:"#f5c500"}},i+1),
              e("td",{style:{padding:"7px 8px"}},dn||"TBC"),
              e("td",{style:{padding:"7px 8px",color:"rgba(255,255,255,0.5)"}},a.hotelLocation||"—"),
              e("td",{style:{padding:"7px 8px"}},a.mealPlan),
              e("td",{style:{padding:"7px 8px",textAlign:"center"}},a.nights),
              e("td",{style:{padding:"7px 8px",textAlign:"right"}},cpp?fmt(cpp):"—")
            );
          }),
          e("tr",{style:{background:"rgba(245,197,0,0.1)",fontWeight:"bold"}},
            e("td",{colSpan:4,style:{padding:"8px 8px",color:"#f5c500"}},"Total"),
            e("td",{style:{padding:"8px 8px",textAlign:"center",color:"#f5c500"}},totals.totalNightsBooked),
            e("td",{style:{padding:"8px 8px",textAlign:"right",color:"#5cef80"}},fmt(totals.accomCPP))
          )
        )
      )
    )
  );
}

// ── TAB: TRANSPORT ─────────────────────────────────────────────────────────
function TabTransport({form,updTrans,addTrans,removeTrans,toggleTrans,expandTransport,totals}){
  const pax=Number(form.pax)||1;

  return e("div",null,
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      e("div",{className:"section-head",style:{margin:0}},"Transport & Transfers"),
      e("button",{className:"btn-outline",onClick:addTrans},"+ Add Transport")
    ),
    // Vehicle logic explainer
    e("div",{style:{padding:"10px 14px",background:"rgba(245,197,0,0.06)",border:"1px solid rgba(245,197,0,0.18)",borderRadius:8,fontSize:12,color:"rgba(255,255,255,0.55)",marginBottom:14}},
      "🚗 Vehicles are charged ",e("b",null,"per vehicle"),", not per person. Enter the vehicle day rate and number of days — the system divides total cost across all ",e("b",null,pax)," pax automatically. If group size exceeds vehicle capacity, an additional vehicle or upgrade is suggested."
    ),
    form.transports.map((t,i)=>{
      const isOpen=expandTransport.includes(i);
      // Vehicle suggestion based on pax
      const suggestions=suggestVehicles(pax);
      const suggested=suggestions[0];
      const fleetEntry=VEHICLE_FLEET.find(v=>v.type===t.vehicleType)||VEHICLE_FLEET[0];
      const numV=Number(t.numVehicles)||1;
      const days=Number(t.vehicleDays)||1;
      const ratePerVeh=Number(t.vehicleCostPerDay)||0;
      const totalVehicleCost=ratePerVeh*days*numV;
      const cpp=pax>0?totalVehicleCost/pax:0;
      // Capacity warning
      const totalCap=(fleetEntry.capacity||4)*numV;
      const capacityOk=totalCap>=pax||t.vehicleType==="N/A";
      const isOverland=t.vehicleType&&t.vehicleType.includes("Overland");

      // Summary for collapsed header
      const summaryParts=[];
      if(t.fromLocation&&t.toLocation)summaryParts.push(t.fromLocation+" → "+t.toLocation);
      else if(t.vehicleType)summaryParts.push(t.vehicleType);
      if(t.pricingBasis==="per_person"&&t.costPerPerson)summaryParts.push(fmt(Number(t.costPerPerson))+"/pax");
      else if(cpp>0)summaryParts.push(fmt(cpp)+"/pax ("+numV+" veh.)");

      return e("div",{key:t.id,className:"accom-card"},
        // ── Header ────────────────────────────────────────────────────
        e("div",{className:"accom-header",style:{background:isOpen?"rgba(245,197,0,0.12)":"rgba(255,255,255,0.04)"},onClick:()=>toggleTrans(i)},
          e("div",{style:{display:"flex",alignItems:"center",gap:12}},
            e("div",{className:"badge"},"🚗"),
            e("div",null,
              e("div",{style:{fontWeight:"bold",fontSize:14}},t.label||t.transportType||"Transport "+(i+1)),
              e("div",{style:{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:2}},summaryParts.join(" · ")||"Details TBC",
                !capacityOk&&e("span",{style:{color:"#f87171",marginLeft:8}},"⚠️ Capacity exceeded")
              )
            )
          ),
          e("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            form.transports.length>1&&e("button",{className:"btn-danger",onClick:ev=>{ev.stopPropagation();removeTrans(i);}},"Remove"),
            e("span",{style:{color:"#f5c500",fontSize:16,transform:isOpen?"rotate(180deg)":"none",display:"inline-block",transition:"0.2s"}},"▾")
          )
        ),

        isOpen&&e("div",{className:"accom-body"},
          // ── Basic fields ──────────────────────────────────────────────
          e("div",{className:"grid2",style:{marginBottom:12}},
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Label / Description"),
              e("input",{className:"inp",value:t.label,onChange:ev=>updTrans(i,"label",ev.target.value),placeholder:"e.g. JKIA → Mara Serena Transfer"})
            ),
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"Transport Type"),
              e("select",{className:"sel",value:t.transportType,onChange:ev=>updTrans(i,"transportType",ev.target.value)},
                TRANSPORT_TYPES.map(r=>e("option",{key:r,value:r},r))
              )
            ),
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"From Location"),
              e("input",{className:"inp",value:t.fromLocation,onChange:ev=>updTrans(i,"fromLocation",ev.target.value),placeholder:"e.g. JKIA, Nairobi"})
            ),
            e("div",{style:{marginBottom:16}},e("label",{className:"field-label"},"To Location"),
              e("input",{className:"inp",value:t.toLocation,onChange:ev=>updTrans(i,"toLocation",ev.target.value),placeholder:"e.g. Mara Serena Lodge"})
            )
          ),

          // ── Pricing Basis toggle ──────────────────────────────────────
          e("div",{style:{marginBottom:12}},
            e("div",{style:{fontSize:11,fontWeight:"bold",color:"rgba(255,255,255,0.45)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}},"How is this charged?"),
            e("div",{style:{display:"flex",gap:6}},
              [
                {v:"per_vehicle",l:"Per Vehicle / Day"},
                {v:"per_person", l:"Per Person (SGR/Shuttle)"},
                {v:"per_trip",   l:"Per Trip (flat)"},
