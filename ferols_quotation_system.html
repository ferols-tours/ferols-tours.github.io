function TabParkFees({form,updPark,addPark,removePark,togglePark,expandPark,totals,sheetData,settings}){
  const parkRows=sheetData.parks||[];
  const pax=Number(form.pax)||1;
  const adults=Math.max(0,pax-Number(form.childrenTotal||0));
  const infants=Number(form.infants||0);
  const children=Number(form.childrenAged||0);
  const youngAdults=Number(form.youngAdults||0);
  const hasKids=Number(form.childrenTotal||0)>0;

  function getRate(row,nat){
    if(!row)return"";
    const res=row["Resident\n(KES)"]||row["Resident (KES)"]||"";
    const eac=row["EAC\n(KES)"]||row["EAC (KES)"]||res;
    const nrKes=row["Non-Resident\n(KES equiv.)"]||row["Non-Resident (KES equiv.)"]||"";
    const nrUsd=row["Non-Resident\n(USD)"]||row["Non-Resident (USD)"]||"";
    if(nat==="Resident")return res;
    if(nat==="EAC Resident")return eac||res;
    if(nrKes)return nrKes;
    if(nrUsd){const r=Number(settings.usdToKes)||129;return String(Math.round(Number(nrUsd)*r));}
    return res;
  }
  function getChildRate(row,nat){
    if(!row)return"";
    // Child/student concession columns
    const childKes=row["Child Rate\n(KES)"]||row["Child Rate (KES)"]||row["Student Rate\n(KES)"]||row["Student Rate (KES)"]||"";
    // If no dedicated child column, derive from KWS standard: children 3-18 = 50% of adult
    if(!childKes){const adult=getRate(row,nat);return adult?String(Math.round(Number(adult)*0.5)):"";}
    return childKes;
  }

  function autoFill(idx,parkName,season,nat){
    const row=parkRows.find(r=>r["Park / Conservancy"]===parkName&&r["Season"]===season);
    const adult=getRate(row,nat);
    const child=getChildRate(row,nat);
    if(adult)updPark(idx,"costPerPerson",adult);
    if(child)updPark(idx,"childCostPerPerson",child);
  }

  // Compute total park cost for a fee entry considering group composition
  function parkFeeGroupTotal(p){
    const adultRate=Number(p.costPerPerson)||0;
    const childRate=Number(p.childCostPerPerson)||0;
    // Infant: free (0%)
    const infantCost=0;
    // Child: child rate (KWS) or fallback to childParkFee% of adult
    const childCost=childRate||adultRate*Number(form.childParkFeeChildPct||50)/100;
    // Young adult: usually adult rate, sometimes child rate depending on park
    const youngAdultRate=Number(p.youngAdultCostPerPerson)||adultRate;
    return adults*adultRate + infants*infantCost + children*childCost + youngAdults*youngAdultRate;
  }

  function parkFeeCPP(p){
    if(!pax)return 0;
    return parkFeeGroupTotal(p)/pax;
  }

  return e("div",null,
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
      e("div",{className:"section-head",style:{margin:0}},"🎟️ Park & Conservancy Fees"),
      e("button",{className:"btn-outline",onClick:addPark},"+ Add Park Fee")
    ),

    // Group composition reminder
    e("div",{style:{padding:"10px 14px",background:"rgba(99,102,241,0.07)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:8,fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:10}},
      e("b",{style:{color:"#a5b4fc"}},"👥 Group: "),
      adults+" adult(s)",
      infants>0?" · "+infants+" infant(s) (free)":"",
      children>0?" · "+children+" child(ren) (concession rate)":"",
      youngAdults>0?" · "+youngAdults+" young adult(s)":"",
      " · ",
      e("b",{style:{color:form.clientType==="Resident"?"#4ade80":form.clientType==="EAC Resident"?"#60a5fa":"#f5c500"}},form.clientType),
      " — ",
      hasKids
        ?"child rates auto-filled from sheet or calculated as 50% of adult. Adjust below."
        :"no children in group."
    ),

    // Package/own choice explainer
    e("div",{style:{padding:"10px 14px",background:"rgba(245,197,0,0.08)",border:"1px solid rgba(245,197,0,0.2)",borderRadius:8,fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:14}},
      "For each park fee, choose whether Ferols includes it in the package price or the client pays at the gate."
    ),

    form.parkFees.length===0&&e("div",{style:{textAlign:"center",padding:"30px",color:"rgba(255,255,255,0.3)",fontSize:14}},
      "No park fees added yet. Click '+ Add Park Fee' to begin."
    ),

    form.parkFees.map((p,i)=>{
      const isOpen=expandPark.includes(i);
      const matched=parkRows.find(r=>r["Park / Conservancy"]===p.parkName&&r["Season"]===p.season);
      const resRate=matched?getRate(matched,"Resident"):"—";
      const eacRate=matched?getRate(matched,"EAC Resident"):"—";
      const nrRate=matched?getRate(matched,"Non-Resident"):"—";
      const sheetChildRate=matched?getChildRate(matched,p.nationality||form.clientType):"";
      const groupTotal=parkFeeGroupTotal(p);
      const cpp=parkFeeCPP(p);
      const nat=p.nationality||form.clientType;

      return e("div",{key:p.id,className:"accom-card",style:{borderColor:p.includedInPackage?"rgba(92,239,128,0.3)":"rgba(245,197,0,0.25)"}},
        // ── Header ──
        e("div",{className:"accom-header",
          style:{background:isOpen?(p.includedInPackage?"rgba(92,239,128,0.08)":"rgba(245,197,0,0.08)"):"rgba(255,255,255,0.03)"},
          onClick:()=>togglePark(i)},
          e("div",{style:{display:"flex",alignItems:"center",gap:12}},
            e("div",{className:"badge",style:{background:p.includedInPackage?"#22c55e":"#f5c500",color:"#0d4a1a"}},
              p.includedInPackage?"✓":"$"
            ),
            e("div",null,
              e("div",{style:{fontWeight:"bold",fontSize:14}},p.parkName||"Park "+(i+1)),
              e("div",{style:{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:2}},
                (p.destination||"Destination TBC")+" · "+p.season+" · "+nat+
                (p.costPerPerson?" · KES "+Number(p.costPerPerson).toLocaleString()+"/adult":"")+
                (hasKids&&p.childCostPerPerson?" · KES "+Number(p.childCostPerPerson).toLocaleString()+"/child":"")+
                (groupTotal>0?" → group total KES "+Math.round(groupTotal).toLocaleString():"")+
                " · "+(p.includedInPackage?"Included":"Client pays")
              )
            )
          ),
          e("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            form.parkFees.length>1&&e("button",{className:"btn-danger",onClick:ev=>{ev.stopPropagation();removePark(i);}},"Remove"),
            e("span",{style:{color:"#f5c500",fontSize:16,transform:isOpen?"rotate(180deg)":"none",display:"inline-block",transition:"0.2s"}},"▾")
          )
        ),

        isOpen&&e("div",{className:"accom-body"},
          // ── Rate comparison banner ──
          matched&&e("div",{style:{padding:"10px 14px",background:"rgba(92,239,128,0.06)",border:"1px solid rgba(92,239,128,0.2)",borderRadius:8,fontSize:12,marginBottom:10}},
            e("div",{style:{fontWeight:"bold",color:"#5cef80",marginBottom:6}},"📊 Sheet rates — active nationality highlighted:"),
            e("div",{style:{display:"flex",gap:12,flexWrap:"wrap"}},
              [{nat:"Resident",l:"🇰🇪 Resident",c:"#4ade80"},{nat:"EAC Resident",l:"🌍 EAC",c:"#60a5fa"},{nat:"Non-Resident",l:"✈️ International",c:"#f5c500"}]
              .map(({nat:n,l,c})=>{
                const r=n==="Resident"?resRate:n==="EAC Resident"?eacRate:nrRate;
                const active=nat===n;
                return e("div",{key:n,style:{padding:"5px 10px",borderRadius:6,border:"1px solid",
                  borderColor:active?c:"rgba(255,255,255,0.08)",
                  background:active?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)"}},
                  e("div",{style:{fontSize:10,color:active?c:"rgba(255,255,255,0.4)",textTransform:"uppercase",marginBottom:1}},l+(active?" ← ACTIVE":"")),
                  e("div",{style:{color:active?"#fff":"rgba(255,255,255,0.45)",fontWeight:active?"bold":"normal"}},r?("KES "+Number(r).toLocaleString()):"—")
                );
              })
            )
          ),

          e("div",{className:"grid2",style:{marginBottom:10}},
            // Park selector
            e("div",{style:{marginBottom:12}},
              e("label",{className:"field-label"},"Park / Conservancy"),
              e("select",{className:"sel",value:p.parkName,
                onChange:ev=>{
                  updPark(i,"parkName",ev.target.value);
                  autoFill(i,ev.target.value,p.season,nat);
                }},
                e("option",{value:""},"— Select Park —"),
                [...new Set(parkRows.map(r=>r["Park / Conservancy"]).filter(Boolean))].map(pk=>
                  e("option",{key:pk,value:pk},pk)
                ),
                e("option",{value:"__manual__"},"✏️ Enter manually")
              )
            ),
            e("div",{style:{marginBottom:12}},
              e("label",{className:"field-label"},"Destination"),
              e("input",{className:"inp",value:p.destination||"",onChange:ev=>updPark(i,"destination",ev.target.value),placeholder:"e.g. Masai Mara"})
            ),
            e("div",{style:{marginBottom:12}},
              e("label",{className:"field-label"},"Season"),
              e("select",{className:"sel",value:p.season,
                onChange:ev=>{updPark(i,"season",ev.target.value);autoFill(i,p.parkName,ev.target.value,nat);}},
                SEASONS.map(s=>e("option",{key:s,value:s},s))
              )
            ),
            e("div",{style:{marginBottom:12}},
              e("label",{className:"field-label"},"Nationality"),
              e("select",{className:"sel",value:nat,
                onChange:ev=>{updPark(i,"nationality",ev.target.value);autoFill(i,p.parkName,p.season,ev.target.value);}},

// ── HELPERS for package label & inc/excl ─────────────────────────────────
function autoPackageLabel(form){
  const meals=[...new Set(form.accommodations.map(a=>a.mealPlan).filter(Boolean))];
  const MEAL_PLANS={BB:"Bed & Breakfast",HB:"Half Board",FB:"Full Board",AI:"All Inclusive"};
  if(meals.length===1)return MEAL_PLANS[meals[0]]+" Safari Package";
  if(meals.length>1)return "Safari Package (Mixed Meal Plans)";
  return "Safari Package";
}

// ── INCLUSIONS / EXCLUSIONS EDITOR ────────────────────────────────────────
function IncExclEditor({form,upd}){
  const addItem=(list,text)=>{
    const items=form[list]||[];
    upd(list,[...items,{id:"u"+uid(),text,enabled:true,system:false}]);
  };
  const removeItem=(list,id)=>upd(list,(form[list]||[]).filter(x=>x.id!==id));
  const toggleItem=(list,id)=>upd(list,(form[list]||[]).map(x=>x.id===id?{...x,enabled:!x.enabled}:x));
  const editItem=(list,id,text)=>upd(list,(form[list]||[]).map(x=>x.id===id?{...x,text}:x));
  const [newInc,setNewInc]=React.useState("");
  const [newExc,setNewExc]=React.useState("");

  const ListEditor=({listKey,items,newVal,setNewVal,accentColor,addLabel})=>{
    return e("div",null,
      e("div",{style:{display:"flex",flexDirection:"column",gap:4,marginBottom:10}},
        items.map(item=>
          e("div",{key:item.id,style:{
            display:"flex",alignItems:"center",gap:8,padding:"6px 10px",
            background:item.enabled?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.01)",
            borderRadius:6,border:"1px solid rgba(255,255,255,0.07)",
            opacity:item.enabled?1:0.45}},
            // Toggle
            e("button",{onClick:()=>toggleItem(listKey,item.id),
              style:{width:30,height:16,borderRadius:8,border:"none",cursor:"pointer",flexShrink:0,
                background:item.enabled?accentColor:"rgba(255,255,255,0.15)",position:"relative",transition:"all 0.2s"}},
              e("span",{style:{position:"absolute",top:2,width:12,height:12,borderRadius:"50%",background:"#fff",
                transition:"all 0.2s",left:item.enabled?"16px":"2px"}})
            ),
            // Text — editable if not system
            item.system
              ?e("span",{style:{flex:1,fontSize:12,color:"rgba(255,255,255,0.7)"}},item.text)
              :e("input",{value:item.text,
                  style:{flex:1,background:"transparent",border:"none",fontSize:12,
                    color:"rgba(255,255,255,0.85)",fontFamily:"Georgia,serif",outline:"none"},
                  onChange:ev=>editItem(listKey,item.id,ev.target.value)}),
            item.system
              ?e("span",{style:{fontSize:10,color:"rgba(255,255,255,0.2)",letterSpacing:0.5}},"default")
              :e("button",{onClick:()=>removeItem(listKey,item.id),
                  style:{background:"none",border:"none",color:"rgba(239,68,68,0.5)",
                    cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px",flexShrink:0}},"×")
          )
        )
      ),
      e("div",{style:{display:"flex",gap:6}},
        e("input",{className:"inp",value:newVal,placeholder:addLabel,
          style:{flex:1,fontSize:12,padding:"5px 10px"},
          onChange:ev=>setNewVal(ev.target.value),
          onKeyDown:ev=>{if(ev.key==="Enter"&&newVal.trim()){addItem(listKey,newVal.trim());setNewVal("");}}}),
        e("button",{onClick:()=>{if(newVal.trim()){addItem(listKey,newVal.trim());setNewVal("");}},
          style:{padding:"5px 14px",border:"1px solid",borderColor:accentColor,borderRadius:6,
            background:"transparent",color:accentColor,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:12}},
          "+ Add")
      )
    );
  };

  return e("div",{style:{marginTop:20}},
    e("div",{className:"section-head",style:{fontSize:14}},"✅ / ❌ Inclusions & Exclusions"),
    e("div",{style:{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:14}},
      "Toggle items on/off, edit text, or add hotel-specific items. These print on every quotation."
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}},
      e("div",null,
        e("div",{style:{background:"#0d4a1a",color:"#f5c500",padding:"8px 12px",borderRadius:"8px 8px 0 0",
          fontWeight:"bold",fontSize:12,textTransform:"uppercase",letterSpacing:1}},"✅ Inclusions"),
        e("div",{style:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",
          borderTop:"none",borderRadius:"0 0 8px 8px",padding:12}},
          e(ListEditor,{listKey:"inclusions",items:form.inclusions||[],newVal:newInc,setNewVal:setNewInc,
            accentColor:"#4ade80",addLabel:"e.g. Game drives in open 4x4 vehicle"})
        )
      ),
      e("div",null,
        e("div",{style:{background:"#7f1d1d",color:"#fff",padding:"8px 12px",borderRadius:"8px 8px 0 0",
          fontWeight:"bold",fontSize:12,textTransform:"uppercase",letterSpacing:1}},"❌ Exclusions"),
        e("div",{style:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",
          borderTop:"none",borderRadius:"0 0 8px 8px",padding:12}},
          e(ListEditor,{listKey:"exclusions",items:form.exclusions||[],newVal:newExc,setNewVal:setNewExc,
            accentColor:"#f87171",addLabel:"e.g. Laundry services"})
        )
      )
    )
  );
}

        e("div",{style:{borderTop:"2px solid #f5c500",paddingTop:22}},
          e("div",{style:{fontSize:28,fontWeight:"bold",color:"#fff",marginBottom:6}},form.groupName||"Group Itinerary"),
          e("div",{style:{color:"#f5c500",fontSize:15,marginBottom:4}},dests),
          e("div",{style:{color:"rgba(255,255,255,0.65)",fontSize:13}},fmtDate(form.checkIn)+" — "+fmtDate(form.checkOut)+" · "+totals.totalNightsBooked+" Nights · "+form.pax+" PAX")
        )
      ),
      e("div",{className:"doc-body"},
        e("div",{className:"quick-info-bar"},
          ...[["📅 Check-in",fmtDate(form.checkIn)],["📅 Check-out",fmtDate(form.checkOut)],["🌙 Nights",String(totals.totalNightsBooked)],["👥 Guests",form.pax+" PAX"]].map(([l,v])=>
            e("div",{key:l,style:{textAlign:"center"}},
              e("div",{style:{fontSize:11,color:"#1a6b2a",fontWeight:"bold",textTransform:"uppercase",letterSpacing:1,marginBottom:4}},l),
              e("div",{style:{fontSize:15,fontWeight:"bold",color:"#0d4a1a"}},v)
            )
          )
        ),
        e("div",{className:"doc-section-title"},"Day-by-Day Programme"),
        form.itinerary.map((day,i)=>
          e("div",{key:day.id,className:"itin-day"},
            e("div",{className:"day-circle"},
              e("div",{style:{fontSize:10,color:"#f5c500",textTransform:"uppercase",letterSpacing:1}},"Day"),
              e("div",{style:{fontSize:20,fontWeight:"bold",color:"#fff",lineHeight:1}},day.day)
            ),
            e("div",{style:{flex:1,paddingTop:6}},
              e("div",{style:{fontWeight:"bold",color:"#0d4a1a",fontSize:15,marginBottom:4}},day.title||"Day "+day.day),
              e("p",{style:{margin:0,color:"#444",lineHeight:1.8,fontSize:14}},day.description||"Activities TBC.")
            )
          )
        ),
        e("div",{className:"doc-section-title",style:{marginTop:24}},"🏨 Accommodation"),
        form.accommodations.map((a,i)=>{
          const dn=a.hotelName==="__manual__"?(a._manualName||""):a.hotelName;
          return e("div",{key:a.id,className:"itin-left-border",style:{padding:"12px 16px",background:i%2?"#f5faf0":"#fff",marginBottom:8,borderRadius:"0 6px 6px 0"}},
            e("div",{style:{fontWeight:"bold",color:"#0d4a1a",fontSize:14}},dn||"TBC"),
            e("div",{style:{color:"#666",fontSize:13}},(a.hotelLocation||"TBC")+" · "+a.nights+" night(s) · "+a.roomType+" · "+a.mealPlan)
          );
        }),
        e("div",{className:"doc-section-title",style:{marginTop:24}},"🚗 Transport"),
        form.transports.map((t,i)=>
          e("div",{key:t.id,className:"itin-left-border",style:{padding:"12px 16px",background:i%2?"#f5faf0":"#fff",marginBottom:8,borderRadius:"0 6px 6px 0",borderLeftColor:"#1a6b2a"}},
            e("div",{style:{fontWeight:"bold",color:"#0d4a1a",fontSize:14}},t.label||t.transportType),
            t.fromLocation&&t.toLocation&&e("div",{style:{color:"#666",fontSize:13}},t.fromLocation+" → "+t.toLocation),
            e("div",{style:{color:"#888",fontSize:12}},t.transportType+(t.vehicleType?" · "+t.vehicleType:""))
          )
        ),
        e("div",{style:{background:"#fffbe6",border:"1px solid #f5c500",borderRadius:8,padding:"18px 20px",marginTop:24,marginBottom:28}},
          e("div",{style:{fontWeight:"bold",color:"#0d4a1a",marginBottom:10,fontSize:14}},"📌 Important Notes"),
          e("ul",{style:{paddingLeft:18,lineHeight:2,fontSize:13,color:"#444",margin:0}},
            e("li",null,"Please carry valid identification / passport at all times."),
            e("li",null,"Check-in: 14:00, Check-out: 10:00 (unless pre-arranged)."),
            e("li",null,"Travel insurance is strongly recommended."),
            e("li",null,"Please advise on dietary requirements in advance."),
            e("li",null,"Wildlife sightings are subject to nature — not guaranteed.")
          )
        ),
        e("div",{className:"doc-footer",style:{display:"flex",alignItems:"center",gap:20}},
          e("img",{src:LOGO,alt:"Ferols",style:{width:50,height:50,borderRadius:"50%",border:"2px solid #f5c500",objectFit:"cover"}}),
          e("div",{style:{flex:1}},
            e("div",{style:{color:"#f5c500",fontWeight:"bold",fontSize:15,letterSpacing:1,textTransform:"uppercase",marginBottom:6}},
              "Prepared by "+settings.companyName
            ),
            e("div",{style:{fontSize:13,color:"rgba(255,255,255,0.75)"}},
              "Exclusively prepared for ",e("b",{style:{color:"#fff"}},form.groupName||"our valued guests")
            ),
            e("div",{style:{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:4}},
              settings.companyEmail+" · "+settings.companyPhone
            )
          )
        )
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
