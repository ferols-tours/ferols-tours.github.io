<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ferols — Agent & Partner Management</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#0a3012;color:#fff;min-height:100vh}
input,select,textarea{font-family:Georgia,serif;outline:none}
.inp{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;padding:9px 12px;font-size:14px}
.inp:focus{border-color:#f5c500;background:rgba(255,255,255,0.1)}
.sel{width:100%;background:#071f0b;border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;padding:9px 12px;font-size:14px}
.sel:focus{border-color:#f5c500}
.textarea{width:100%;min-height:72px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;padding:9px 12px;font-size:14px;resize:vertical}
.fl-label{display:block;font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-weight:bold}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
.mb{margin-bottom:14px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:22px;margin-bottom:14px}
.sh{font-size:13px;font-weight:bold;color:#f5c500;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(245,197,0,0.2);padding-bottom:7px}
.btn{border-radius:8px;padding:9px 20px;font-weight:bold;cursor:pointer;font-size:13px;font-family:Georgia,serif;border:none}
.btn-gold{background:linear-gradient(135deg,#1a6b2a,#2d8a3e);color:#fff;border:2px solid #f5c500}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed}
.btn-outline{background:rgba(245,197,0,0.1);color:#f5c500;border:1px solid #f5c500}
.btn-outline:hover{background:rgba(245,197,0,0.2)}
.btn-sm{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.13);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:Georgia,serif}
.btn-sm:hover{background:rgba(255,255,255,0.12)}
.nav{background:linear-gradient(90deg,#0d4a1a,#1a6b2a,#0d4a1a);border-bottom:3px solid #f5c500;padding:0 24px;display:flex;align-items:center;gap:14px;height:64px;position:sticky;top:0;z-index:50}
.nav-tabs{display:flex;gap:4px;margin-left:auto}
.nav-tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-family:Georgia,serif;color:rgba(255,255,255,0.55);border:1px solid transparent;transition:all 0.15s}
.nav-tab:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-tab.active{background:rgba(245,197,0,0.14);color:#f5c500;border-color:rgba(245,197,0,0.35);font-weight:bold}
.toast{position:fixed;bottom:24px;right:80px;background:#1a6b2a;border:2px solid #f5c500;border-radius:10px;padding:13px 20px;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.toast-err{background:#7f1d1d;border-color:#ef4444}
.agent-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all 0.15s;margin-bottom:10px}
.agent-card:hover{background:rgba(245,197,0,0.07);border-color:rgba(245,197,0,0.3);transform:translateY(-1px)}
.agent-card.inactive{opacity:0.5}
.avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#1a6b2a,#f5c500);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:#0d4a1a;flex-shrink:0;border:2px solid rgba(245,197,0,0.4)}
.stat-pill{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px 16px;text-align:center}
.stat-val{font-size:22px;font-weight:bold;color:#f5c500;margin-bottom:3px}
.stat-lbl{font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;letter-spacing:0.5px;text-transform:uppercase}
.tag-green{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.25)}
.tag-gold{background:rgba(245,197,0,0.15);color:#f5c500;border:1px solid rgba(245,197,0,0.25)}
.tag-gray{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1)}
.tag-red{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.25)}
.info-row{display:flex;border-bottom:1px solid rgba(255,255,255,0.05)}
.info-lbl{width:160px;flex-shrink:0;padding:8px 12px;font-size:12px;color:rgba(255,255,255,0.4);font-weight:bold;text-transform:uppercase;letter-spacing:0.5px}
.info-val{flex:1;padding:8px 12px;font-size:13px;color:rgba(255,255,255,0.85)}
.search-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 16px;color:#fff;font-size:14px;width:100%;font-family:Georgia,serif}
.search-box:focus{outline:none;border-color:#f5c500}
.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.25)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:rgba(255,255,255,0.35)}
.commission-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px}
.commission-row:last-child{border-bottom:none}
.back-to-hub{position:fixed;bottom:20px;right:20px;background:#0d4a1a;border:2px solid #f5c500;border-radius:30px;padding:10px 18px;color:#f5c500;font-size:13px;font-weight:bold;cursor:pointer;z-index:999;font-family:Georgia,serif;box-shadow:0 4px 16px rgba(0,0,0,0.4);text-decoration:none;display:flex;align-items:center;gap:8px}
.back-to-hub:hover{background:#1a6b2a}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}.info-lbl{width:120px}}
@media print{.back-to-hub,.nav,.no-print{display:none}}
</style>
</head>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwt1QO5uDpo5AyqP9GM5t2tSjIgRB9YpklNMj_3oRUMfy4dODIzu4jONGVvlNvtgWj1mg/exec";
const BUSINESS_SHEET_ID="13Wvim4jvu2-tNEqvSvwkMDDRJuZ0QMvfCABJmof972w";
const e=React.createElement;
const {useState,useEffect,useCallback,useMemo}=React;

// ── Helpers ───────────────────────────────────────────────────────────────
function fmt(n){if(!n&&n!==0)return"—";return"KES "+Number(n).toLocaleString("en-KE",{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDate(d){if(!d||d==="")return"—";try{return new Date(d+"T12:00:00").toLocaleDateString("en-KE",{day:"numeric",month:"short",year:"numeric"});}catch(ex){return d;}}
function initials(name){if(!name)return"?";return name.trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
function pct(a,b){if(!b||b===0)return 0;return Math.round((a/b)*100);}

// ── API ───────────────────────────────────────────────────────────────────
async function apiCall(payload){
  try{
    const res=await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
    return await res.json();
  }catch(err){return{ok:false,error:err.message};}
}
async function loadSheet(sheet){
  const proxy="https://api.allorigins.win/raw?url=";
  const url="https://docs.google.com/spreadsheets/d/"+BUSINESS_SHEET_ID+"/gviz/tq?tqx=out:csv&sheet="+encodeURIComponent(sheet);
  try{
    const res=await Promise.race([fetch(proxy+encodeURIComponent(url)),new Promise((_,r)=>setTimeout(()=>r(new Error("t")),8000))]);
    const text=await res.text();
    return parseCSV(text);
  }catch(err){return[];}
}
function parseCSV(text){
  const lines=text.split("\n").filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=parseRow(lines[0]).map(h=>h.replace(/"/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=parseRow(line);
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||"").replace(/"/g,"").trim();});
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}
function parseRow(line){
  const res=[];let cur="";let inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==="\"")inQ=!inQ;
    else if(line[i]===","&&!inQ){res.push(cur);cur="";}
    else cur+=line[i];
  }
  res.push(cur);return res;
}

const blank=()=>({
  name:"",company:"",email:"",phone:"",
  commissionRate:10,commissionType:"Percentage",
  region:"",speciality:"",
  bankName:"",bankAccount:"",mpesa:"",
  contractStart:"",contractEnd:"",
  status:"Active",notes:""
});

// ── TOAST ─────────────────────────────────────────────────────────────────
function Toast({msg,err,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,4000);return()=>clearTimeout(t);},[]);
  return e("div",{className:"toast"+(err?" toast-err":"")},err?"❌ ":"✅ ",msg);
}

// ── MAIN APP ──────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("agents");
  const [agents,setAgents]=useState([]);
  const [bookings,setBookings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState(blank());
  const [search,setSearch]=useState("");
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  const showToast=(msg,err)=>setToast({msg,err});

  const fetchAll=useCallback(async()=>{
    setLoading(true);
    const [agts,bkgs]=await Promise.all([loadSheet("Agents"),loadSheet("Bookings")]);
    setAgents(agts);
    setBookings(bkgs);
    setLoading(false);
  },[]);

  useEffect(()=>{fetchAll();},[]);

  // Compute commission per agent from bookings
  const agentStats=useMemo(()=>{
    const stats={};
    agents.forEach(a=>{
      const agentBookings=bookings.filter(b=>
        (b.AgentName||"").toLowerCase()===(a.Name||"").toLowerCase()||
        (b.AgentID||"")===(a.ID||"")
      );
      const totalRevenue=agentBookings.reduce((s,b)=>s+Number(b.TotalAmount||0),0);
      const commRate=Number(a.CommissionRate||10)/100;
      const commEarned=totalRevenue*commRate;
      stats[a.ID||a.Name]={bookings:agentBookings.length,revenue:totalRevenue,commission:commEarned,trips:agentBookings};
    });
    return stats;
  },[agents,bookings]);

  // Overall stats
  const totalCommission=Object.values(agentStats).reduce((s,a)=>s+a.commission,0);
  const totalAgentRevenue=Object.values(agentStats).reduce((s,a)=>s+a.revenue,0);
  const activeAgents=agents.filter(a=>a.Status==="Active").length;

  const saveAgent=async()=>{
    if(!form.name.trim()){showToast("Agent name is required",true);return;}
    setSaving(true);
    const res=await apiCall({action:"saveAgent",data:{
      name:form.name,company:form.company,email:form.email,phone:form.phone,
      commissionRate:Number(form.commissionRate)||10,
      commissionType:form.commissionType,
      region:form.region,speciality:form.speciality,
      bankName:form.bankName,bankAccount:form.bankAccount,mpesa:form.mpesa,
      contractStart:form.contractStart,contractEnd:form.contractEnd,
      status:form.status,notes:form.notes,
    }});
    setSaving(false);
    if(res.ok){
      showToast("Agent saved — "+res.data?.id);
      setForm(blank());setTab("agents");fetchAll();
    }else showToast("Save failed: "+(res.error||""),true);
  };

  const filtered=agents.filter(a=>{
    if(!search)return true;
    const q=search.toLowerCase();
    return (a.Name||"").toLowerCase().includes(q)||
           (a.Company||"").toLowerCase().includes(q)||
           (a.Email||"").toLowerCase().includes(q)||
           (a.Region||"").toLowerCase().includes(q);
  });

  if(selected) return e(AgentProfile,{
    agent:selected,
    stats:agentStats[selected.ID||selected.Name]||{bookings:0,revenue:0,commission:0,trips:[]},
    onBack:()=>{setSelected(null);fetchAll();}
  });

  return e("div",null,
    e("div",{className:"nav"},
      e("img",{src:LOGO,style:{width:40,height:40,borderRadius:"50%",border:"2px solid #f5c500",objectFit:"cover"}}),
      e("div",null,
        e("div",{style:{fontSize:15,fontWeight:"bold",color:"#f5c500",letterSpacing:1,textTransform:"uppercase"}},"Agent & Partner Management"),
        e("div",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",letterSpacing:2}},"FEROLS TOURS & SAFARIS")
      ),
      e("div",{className:"nav-tabs"},
        [{id:"agents",label:"🤝 Agents"},{id:"commissions",label:"💰 Commissions"},{id:"new",label:"+ New Agent"}].map(t=>
          e("div",{key:t.id,className:"nav-tab"+(tab===t.id?" active":""),onClick:()=>setTab(t.id)},t.label)
        )
      )
    ),

    e("div",{style:{maxWidth:1000,margin:"0 auto",padding:"24px"}},

      // ── AGENTS LIST ──
      tab==="agents"&&e("div",null,
        // Stats
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}},
          [["🤝","Active Agents",activeAgents],["📅","Agent Bookings",Object.values(agentStats).reduce((s,a)=>s+a.bookings,0)],
           ["💰","Total Commission",fmt(totalCommission)],["📈","Agent Revenue",fmt(totalAgentRevenue)]
          ].map(([icon,label,val])=>
            e("div",{key:label,className:"stat-pill"},
              e("div",{className:"stat-val"},icon+" "+(typeof val==="string"?val:val)),
              e("div",{className:"stat-lbl"},label)
            )
          )
        ),
        // Search
        e("div",{style:{display:"flex",gap:10,marginBottom:14}},
          e("input",{className:"search-box",value:search,placeholder:"🔍 Search by name, company, region...",onChange:ev=>setSearch(ev.target.value)}),
          e("button",{className:"btn btn-sm",onClick:fetchAll},"🔄 Refresh"),
          e("button",{className:"btn btn-gold",onClick:()=>setTab("new")},"+ New Agent")
        ),
        loading?e("div",{className:"loading"},"⏳ Loading agents..."):
        filtered.length===0?e("div",{className:"empty-state"},
          e("div",{style:{fontSize:40,marginBottom:12}},"🤝"),
          e("div",{style:{fontSize:14,marginBottom:6}},search?"No agents match your search":"No agents yet"),
          e("div",{style:{fontSize:12,opacity:0.5}},search?"Try a different search":"Click '+ New Agent' to add your first agent")
        ):
        filtered.map((a,i)=>{
          const st=agentStats[a.ID||a.Name]||{bookings:0,revenue:0,commission:0};
          return e("div",{key:a.ID||i,className:"agent-card"+(a.Status==="Inactive"?" inactive":""),onClick:()=>setSelected(a)},
            e("div",{style:{display:"flex",gap:14,alignItems:"flex-start",flexWrap:"wrap"}},
              e("div",{className:"avatar"},initials(a.Name)),
              e("div",{style:{flex:1,minWidth:0}},
                e("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}},
                  e("span",{style:{fontWeight:"bold",fontSize:15}},a.Name),
                  e("span",{className:"tag "+(a.Status==="Active"?"tag-green":"tag-gray")},a.Status||"Active"),
                  a.Speciality&&e("span",{className:"tag tag-gold"},a.Speciality)
                ),
                e("div",{style:{fontSize:12,color:"rgba(255,255,255,0.45)",display:"flex",gap:12,flexWrap:"wrap"}},
                  a.Company&&e("span",null,"🏢 "+a.Company),
                  a.Email&&e("span",null,"✉ "+a.Email),
                  a.Phone&&e("span",null,"📱 "+a.Phone),
                  a.Region&&e("span",null,"🌍 "+a.Region)
                )
              ),
              e("div",{style:{display:"flex",gap:16,flexShrink:0,flexWrap:"wrap"}},
                e("div",{style:{textAlign:"center"}},
                  e("div",{style:{fontSize:18,fontWeight:"bold",color:"#f5c500"}},st.bookings),
                  e("div",{style:{fontSize:10,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1}},"Bookings")
                ),
                e("div",{style:{textAlign:"center"}},
                  e("div",{style:{fontSize:18,fontWeight:"bold",color:"#4ade80"}},fmt(st.commission)),
                  e("div",{style:{fontSize:10,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1}},"Commission")
                ),
                e("div",{style:{textAlign:"center"}},
                  e("div",{style:{fontSize:16,fontWeight:"bold",color:"rgba(255,255,255,0.6)"}},a.CommissionRate||10,"%"),
                  e("div",{style:{fontSize:10,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1}},"Rate")
                )
              )
            )
          );
        })
      ),

      // ── COMMISSIONS ──
      tab==="commissions"&&e("div",null,
        e("div",{className:"card",style:{marginBottom:16,padding:"14px 18px",background:"rgba(245,197,0,0.06)",border:"1px solid rgba(245,197,0,0.2)"}},
          e("div",{style:{fontSize:13,color:"rgba(255,255,255,0.6)",lineHeight:1.8}},
            e("b",{style:{color:"#f5c500"}},"💡 How commissions work: "),
            "Commission is calculated automatically from bookings linked to each agent. ",
            "Set each agent's rate when creating their profile. Commissions are based on total booking value."
          )
        ),
        agents.length===0?e("div",{className:"empty-state"},
          e("div",{style:{fontSize:40,marginBottom:12}},"💰"),
          e("div",{style:{fontSize:14}},"No agents yet — add agents first")
        ):
        e("div",{className:"card",style:{padding:0,overflow:"hidden"}},
          e("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",padding:"10px 16px",background:"rgba(245,197,0,0.08)",fontSize:11,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1}},
            "Agent","Rate","Bookings","Revenue Generated","Commission Due"
          ),
          agents.map((a,i)=>{
            const st=agentStats[a.ID||a.Name]||{bookings:0,revenue:0,commission:0};
            return e("div",{key:a.ID||i,
              style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",padding:"13px 16px",borderBottom:"1px solid rgba(255,255,255,0.05)",alignItems:"center",fontSize:13}},
              e("div",{style:{display:"flex",gap:10,alignItems:"center"}},
                e("div",{style:{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#1a6b2a,#f5c500)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:"bold",color:"#0d4a1a"}},initials(a.Name)),
                e("div",null,
                  e("div",{style:{fontWeight:"bold"}},a.Name),
                  e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.35)"}},a.Company||"Independent")
                )
              ),
              e("div",{style:{color:"#f5c500",fontWeight:"bold"}},a.CommissionRate||10,"%"),
              e("div",null,st.bookings),
              e("div",null,fmt(st.revenue)),
              e("div",{style:{color:"#4ade80",fontWeight:"bold"}},fmt(st.commission))
            );
          }),
          // Totals
          e("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",padding:"13px 16px",background:"rgba(245,197,0,0.08)",borderTop:"2px solid rgba(245,197,0,0.2)",fontSize:13,fontWeight:"bold"}},
            e("div",{style:{color:"#f5c500"}},"TOTALS"),e("div",null),
            e("div",null,Object.values(agentStats).reduce((s,a)=>s+a.bookings,0)),
            e("div",null,fmt(totalAgentRevenue)),
            e("div",{style:{color:"#4ade80"}},fmt(totalCommission))
          )
        )
      ),

      // ── NEW AGENT FORM ──
      tab==="new"&&e("div",null,
        e("div",{className:"card"},
          e("div",{className:"sh"},"Agent / Partner Details"),
          e("div",{className:"g2"},
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Full Name *"),e("input",{className:"inp",value:form.name,placeholder:"Agent full name",onChange:ev=>upd("name",ev.target.value)})),
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Company / Agency"),e("input",{className:"inp",value:form.company,placeholder:"e.g. Nairobi Travel Agency",onChange:ev=>upd("company",ev.target.value)})),
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Email"),e("input",{className:"inp",type:"email",value:form.email,placeholder:"agent@email.com",onChange:ev=>upd("email",ev.target.value)})),
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Phone / WhatsApp"),e("input",{className:"inp",value:form.phone,placeholder:"+254 7XX XXX XXX",onChange:ev=>upd("phone",ev.target.value)})),
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Region / Market"),e("input",{className:"inp",value:form.region,placeholder:"e.g. Nairobi, UK, Germany, USA",onChange:ev=>upd("region",ev.target.value)})),
            e("div",{className:"mb"},
              e("label",{className:"fl-label"},"Speciality"),
              e("select",{className:"sel",value:form.speciality,onChange:ev=>upd("speciality",ev.target.value)},
                ["","Luxury","Budget","Family","Corporate","Honeymoon","Adventure","Group Tours","All"].map(v=>e("option",{key:v,value:v},v||"— Select —"))
              )
            )
          )
        ),

        e("div",{className:"card"},
          e("div",{className:"sh"},"Commission Structure"),
          e("div",{className:"g3"},
            e("div",{className:"mb"},
              e("label",{className:"fl-label"},"Commission Type"),
              e("select",{className:"sel",value:form.commissionType,onChange:ev=>upd("commissionType",ev.target.value)},
                ["Percentage","Fixed Per Booking","Per PAX"].map(v=>e("option",{key:v,value:v},v))
              )
            ),
            e("div",{className:"mb"},
              e("label",{className:"fl-label"},form.commissionType==="Percentage"?"Commission %":"Commission Amount (KES)"),
              e("input",{className:"inp",type:"number",value:form.commissionRate,placeholder:form.commissionType==="Percentage"?"e.g. 10":"e.g. 5000",onChange:ev=>upd("commissionRate",ev.target.value)})
            ),
            e("div",{className:"mb"},
              e("label",{className:"fl-label"},"Status"),
              e("select",{className:"sel",value:form.status,onChange:ev=>upd("status",ev.target.value)},
                ["Active","Inactive","Suspended"].map(v=>e("option",{key:v,value:v},v))
              )
            )
          ),
          // Live preview
          form.commissionRate&&e("div",{style:{padding:"10px 14px",background:"rgba(245,197,0,0.08)",border:"1px solid rgba(245,197,0,0.2)",borderRadius:8,fontSize:13,color:"rgba(255,255,255,0.7)"}},
            "💡 Example: On a KES 150,000 booking, this agent earns ",
            e("b",{style:{color:"#f5c500"}},
              form.commissionType==="Percentage"
                ?fmt(150000*(Number(form.commissionRate)/100))
                :fmt(Number(form.commissionRate))
            )," commission."
          )
        ),

        e("div",{className:"card"},
          e("div",{className:"sh"},"Contract Period"),
          e("div",{className:"g2"},
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Contract Start"),e("input",{className:"inp",type:"date",value:form.contractStart,onChange:ev=>upd("contractStart",ev.target.value)})),
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Contract End / Review Date"),e("input",{className:"inp",type:"date",value:form.contractEnd,onChange:ev=>upd("contractEnd",ev.target.value)}))
          )
        ),

        e("div",{className:"card"},
          e("div",{className:"sh"},"Payment Details"),
          e("div",{className:"g3"},
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Bank Name"),e("input",{className:"inp",value:form.bankName,placeholder:"e.g. Equity Bank",onChange:ev=>upd("bankName",ev.target.value)})),
            e("div",{className:"mb"},e("label",{className:"fl-label"},"Account Number"),e("input",{className:"inp",value:form.bankAccount,placeholder:"Account number",onChange:ev=>upd("bankAccount",ev.target.value)})),
            e("div",{className:"mb"},e("label",{className:"fl-label"},"M-Pesa Number"),e("input",{className:"inp",value:form.mpesa,placeholder:"+254 7XX XXX XXX",onChange:ev=>upd("mpesa",ev.target.value)}))
          )
        ),

        e("div",{className:"mb"},e("label",{className:"fl-label"},"Notes"),e("textarea",{className:"textarea",value:form.notes,placeholder:"Any additional notes about this agent or partnership...",onChange:ev=>upd("notes",ev.target.value)})),

        e("div",{style:{display:"flex",gap:10,justifyContent:"flex-end",paddingBottom:40}},
          e("button",{className:"btn btn-sm",onClick:()=>{setForm(blank());setTab("agents")}},"Cancel"),
          e("button",{className:"btn btn-gold",onClick:saveAgent,disabled:saving},saving?"⏳ Saving...":"💾 Save Agent")
        )
      )
    ),
    toast&&e(Toast,{msg:toast.msg,err:toast.err,onDone:()=>setToast(null)})
  );
}

// ── AGENT PROFILE ─────────────────────────────────────────────────────────
function AgentProfile({agent:a,stats,onBack}){
  const iRow=(l,v)=>v?e("div",{className:"info-row"},e("div",{className:"info-lbl"},l),e("div",{className:"info-val"},v)):null;

  return e("div",null,
    e("div",{className:"nav"},
      e("img",{src:LOGO,style:{width:40,height:40,borderRadius:"50%",border:"2px solid #f5c500",objectFit:"cover"}}),
      e("div",{style:{fontSize:15,fontWeight:"bold",color:"#f5c500",textTransform:"uppercase",letterSpacing:1}},"Agent Profile"),
      e("div",{style:{marginLeft:"auto",display:"flex",gap:8}},
        e("button",{className:"btn btn-sm",onClick:onBack},"← Back"),
        e("button",{className:"btn btn-outline",onClick:()=>window.print()},"🖨️ Print")
      )
    ),
    e("div",{style:{maxWidth:900,margin:"0 auto",padding:"24px"}},
      // Header
      e("div",{style:{background:"linear-gradient(135deg,#0d4a1a,#1a6b2a)",borderRadius:14,padding:"24px 28px",marginBottom:14,border:"1px solid rgba(245,197,0,0.3)"}},
        e("div",{style:{display:"flex",gap:18,alignItems:"flex-start",flexWrap:"wrap"}},
          e("div",{style:{width:68,height:68,borderRadius:"50%",background:"linear-gradient(135deg,#1a6b2a,#f5c500)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:"bold",color:"#0d4a1a",flexShrink:0}},initials(a.Name)),
          e("div",{style:{flex:1}},
            e("div",{style:{fontSize:22,fontWeight:"bold",color:"#fff",marginBottom:4}},a.Name),
            e("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}},
              e("span",{className:"tag "+(a.Status==="Active"?"tag-green":"tag-gray")},a.Status||"Active"),
              a.Speciality&&e("span",{className:"tag tag-gold"},a.Speciality),
              a.Region&&e("span",{className:"tag tag-gold"},"🌍 "+a.Region)
            ),
            e("div",{style:{fontSize:12,color:"rgba(255,255,255,0.5)"}},a.Company&&"🏢 "+a.Company+" · ",a.ID)
          ),
          e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,flexShrink:0}},
            [["Bookings",stats.bookings,"#f5c500"],["Revenue",fmt(stats.revenue),"#60a5fa"],["Commission",fmt(stats.commission),"#4ade80"]].map(([l,v,c])=>
              e("div",{key:l,style:{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"10px 14px"}},
                e("div",{style:{fontSize:18,fontWeight:"bold",color:c}},v),
                e("div",{style:{fontSize:10,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1,marginTop:2}},l)
              )
            )
          )
        )
      ),
      // Details
      e("div",{className:"g2",style:{gap:14}},
        e("div",{className:"card"},
          e("div",{className:"sh"},"Contact & Details"),
          iRow("Email",a.Email),iRow("Phone",a.Phone),iRow("Company",a.Company),
          iRow("Region",a.Region),iRow("Speciality",a.Speciality),iRow("Agent ID",a.ID)
        ),
        e("div",{className:"card"},
          e("div",{className:"sh"},"Commission & Contract"),
          iRow("Commission Rate",a.CommissionRate+"%"),
          iRow("Commission Type",a.CommissionType||"Percentage"),
          iRow("Contract Start",fmtDate(a.ContractStart||a["Contract Start"])),
          iRow("Contract End",fmtDate(a.ContractEnd||a["Contract End"])),
          iRow("M-Pesa",a.Mpesa||a.mpesa),
          iRow("Bank",a.BankName&&(a.BankName+" · "+a.BankAccount))
        )
      ),
      // Linked bookings
      stats.trips&&stats.trips.length>0&&e("div",{className:"card"},
        e("div",{className:"sh"},"Linked Bookings"),
        stats.trips.map((b,i)=>
          e("div",{key:b.ID||i,className:"commission-row"},
            e("div",{style:{flex:1}},
              e("div",{style:{fontWeight:"bold",fontSize:13}},b.ClientName||b.GroupName),
              e("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)"}},b.Destination," · ",fmtDate(b.CheckIn)," · ",b.ID)
            ),
            e("div",{style:{textAlign:"right"}},
              e("div",{style:{fontSize:13,fontWeight:"bold",color:"#f5c500"}},fmt(Number(b.TotalAmount||0))),
              e("div",{style:{fontSize:11,color:"#4ade80"}},fmt(Number(b.TotalAmount||0)*(Number(a.CommissionRate||10)/100))," commission")
            )
          )
        )
      ),
      a.Notes&&e("div",{className:"card"},
        e("div",{className:"sh"},"Notes"),
        e("div",{style:{fontSize:13,color:"rgba(255,255,255,0.65)",lineHeight:1.8}},a.Notes)
      ),
      e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        e("button",{className:"btn btn-sm",onClick:onBack},"← Back to Agents")
      )
    )
  );
}





ReactDOM.render(e(App),document.getElementById('root'));
</script>
</body>
